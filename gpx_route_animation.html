<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPX 경로 애니메이션</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #eee; height: 100vh; display: flex; flex-direction: column; }

  #map { flex: 1; }

  #panel {
    background: linear-gradient(135deg, #1a1d2e, #16213e);
    padding: 14px 20px;
    border-top: 1px solid #2a2d4e;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 16px;
    min-width: 100px;
  }
  .stat-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 18px; font-weight: 700; color: #7ecfff; margin-top: 2px; }
  .stat-unit { font-size: 10px; color: #aaa; }

  #progress-bar-wrapper {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #progress-bar-bg {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    cursor: pointer;
    position: relative;
  }
  #progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4facfe, #00f2fe);
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
  }
  #time-label { font-size: 12px; color: #aaa; white-space: nowrap; min-width: 90px; text-align: right; }

  #controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
  }

  button {
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    transition: all 0.2s;
  }
  #btn-play {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: #000;
    min-width: 90px;
  }
  #btn-play:hover { opacity: 0.85; transform: scale(1.03); }
  #btn-reset {
    background: rgba(255,255,255,0.08);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.15);
  }
  #btn-reset:hover { background: rgba(255,255,255,0.15); }

  .speed-group { display: flex; align-items: center; gap: 6px; }
  .speed-group span { font-size: 12px; color: #888; }
  .speed-btn {
    background: rgba(255,255,255,0.06);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .speed-btn:hover, .speed-btn.active {
    background: rgba(79,172,254,0.25);
    border-color: #4facfe;
    color: #7ecfff;
  }

  /* Elevation mini-chart */
  #elev-chart {
    width: 100%;
    height: 50px;
    position: relative;
    cursor: pointer;
  }
  #elev-canvas { width: 100%; height: 100%; border-radius: 6px; }
  #elev-cursor {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: #fff;
    opacity: 0.7;
    pointer-events: none;
    left: 0;
  }
</style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div id="stats">

    </div>
    <div class="stat">

    </div>
    <div class="stat">

    </div>
    <div class="stat">

      <div class="stat-unit">mm:ss</div>
    </div>
    <div class="stat">
      <div class="stat-label">속도</div>
      <div class="stat-value" id="s-speed">–</div>
      <div class="stat-unit">km/h</div>
    </div>
  </div>

  <div id="elev-chart">
    <canvas id="elev-canvas"></canvas>

  </div>

  <div id="progress-bar-wrapper">
    <div id="progress-bar-bg">

    </div>
    <div id="time-label" id="time-elapsed">0 / 243 pts</div>
  </div>

  <div id="controls">
    <button id="btn-reset">↺ 리셋</button>
    <button id="btn-play">▶ 재생</button>
    <div class="speed-group">

      <button class="speed-btn" data-speed="8">8×</button>
      <button class="speed-btn" data-speed="20">20×</button>
    </div>
  </div>
</div>

function haversine(a, b) {
  const R = 6371, toR = Math.PI/180;
  const dLat = (b.lat - a.lat)*toR, dLon = (b.lon - a.lon)*toR;
  const x = Math.sin(dLat/2)**2 + Math.cos(a.lat*toR)*Math.cos(b.lat*toR)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

});
const startIcon = L.divIcon({
  className: '', html: `<div style="width:12px;height:12px;background:#2ecc71;border:2px solid #fff;border-radius:50%"></div>`,
  iconSize:[12,12], iconAnchor:[6,6]
});
const endIcon = L.divIcon({
  className: '', html: `<div style="width:12px;height:12px;background:#e74c3c;border:2px solid #fff;border-radius:50%"></div>`,
  iconSize:[12,12], iconAnchor:[6,6]
});
L.marker([POINTS[0].lat, POINTS[0].lon], {icon: startIcon}).addTo(map).bindPopup('출발');
L.marker([POINTS[POINTS.length-1].lat, POINTS[POINTS.length-1].lon], {icon: endIcon}).addTo(map).bindPopup('도착');
const posMarker = L.marker([POINTS[0].lat, POINTS[0].lon], {icon: markerIcon}).addTo(map);

// ── 고도 차트 ──────────────────────────────────────────────
const canvas = document.getElementById('elev-canvas');
const ctx = canvas.getContext('2d');
const elevCursor = document.getElementById('elev-cursor');

function drawElevChart(curIdx) {
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
  const eles = POINTS.map(p => p.ele);
  const eMin = Math.min(...eles), eMax = Math.max(...eles);
  const eRange = eMax - eMin || 1;
  const xOf = i => (i / (POINTS.length-1)) * W;
  const yOf = e => H - ((e - eMin) / eRange) * (H * 0.85) - H*0.05;

  // 배경 영역 (미진행)
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let i = 0; i < POINTS.length; i++) ctx.lineTo(xOf(i), yOf(eles[i]));
  ctx.lineTo(W, H); ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.05)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1.5; ctx.stroke();

  // 진행 영역
  if (curIdx > 0) {
    ctx.beginPath();
    ctx.moveTo(0, H);
    for (let i = 0; i <= curIdx; i++) ctx.lineTo(xOf(i), yOf(eles[i]));
    ctx.lineTo(xOf(curIdx), H); ctx.closePath();
    const grad = ctx.createLinearGradient(0,0,xOf(curIdx),0);
    grad.addColorStop(0,'rgba(79,172,254,0.5)');
    grad.addColorStop(1,'rgba(0,242,254,0.5)');
    ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath();
    for (let i = 0; i <= curIdx; i++) i===0 ? ctx.moveTo(xOf(i),yOf(eles[i])) : ctx.lineTo(xOf(i),yOf(eles[i]));
    ctx.strokeStyle = '#4facfe'; ctx.lineWidth = 2; ctx.stroke();
  }

  // 커서
  const cx = xOf(curIdx);
  elevCursor.style.left = cx + 'px';
}
drawElevChart(0);

// ── 상태 ──────────────────────────────────────────────────
let curIdx = 0, playing = false, speed = 1, rafId = null, lastTs = null;
// 실제 시간 기준 ms/step
const msPerStep = (tEnd - t0) / (POINTS.length - 1);

function formatTime(sec) {
  const m = Math.floor(sec/60).toString().padStart(2,'0');
  const s = Math.floor(sec%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

function updateUI(idx) {
  const p = POINTS[idx];
  const elapsed = (new Date(p.time).getTime() - t0) / 1000;
  document.getElementById('s-dist').textContent = cumDist[idx].toFixed(2);
  document.getElementById('s-total').textContent = totalDist.toFixed(2);
  document.getElementById('s-ele').textContent = Math.round(p.ele);
  document.getElementById('s-time').textContent = formatTime(elapsed);
  // 속도 계산
  if (idx > 0) {
    const dt = (new Date(p.time).getTime() - new Date(POINTS[idx-1].time).getTime()) / 3600000;
    const dd = haversine(POINTS[idx-1], p);
    const spd = dt > 0 ? (dd/dt) : 0;
    document.getElementById('s-speed').textContent = spd.toFixed(1);
  }
  const pct = idx / (POINTS.length - 1) * 100;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  document.getElementById('time-label').textContent = `${idx} / ${POINTS.length-1} pts`;
  drawElevChart(idx);
}

function goTo(idx) {
  curIdx = Math.max(0, Math.min(POINTS.length-1, idx));
  const pts = POINTS.slice(0, curIdx+1).map(p => [p.lat, p.lon]);
  animLine.setLatLngs(pts);
  posMarker.setLatLng([POINTS[curIdx].lat, POINTS[curIdx].lon]);
  updateUI(curIdx);
}

// ── 애니메이션 루프 ─────────────────────────────────────────
let accumMs = 0;
function animate(ts) {
  if (!playing) return;
  if (lastTs !== null) {
    accumMs += (ts - lastTs) * speed;
    const stepsToAdvance = Math.floor(accumMs / msPerStep);
    if (stepsToAdvance > 0) {
      accumMs -= stepsToAdvance * msPerStep;
      const next = curIdx + stepsToAdvance;
      if (next >= POINTS.length - 1) {
        goTo(POINTS.length - 1);
        playing = false;
        document.getElementById('btn-play').textContent = '▶ 재생';
        return;
      }
      goTo(next);
    }
  }
  lastTs = ts;
  rafId = requestAnimationFrame(animate);
}

function togglePlay() {
  if (curIdx >= POINTS.length - 1) { goTo(0); }
  playing = !playing;
  document.getElementById('btn-play').textContent = playing ? '⏸ 일시정지' : '▶ 재생';
  if (playing) { lastTs = null; accumMs = 0; rafId = requestAnimationFrame(animate); }
  else { cancelAnimationFrame(rafId); }
}

document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-reset').addEventListener('click', () => {
  playing = false; cancelAnimationFrame(rafId);
  document.getElementById('btn-play').textContent = '▶ 재생';
  goTo(0); accumMs = 0;
});

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    speed = +btn.dataset.speed;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    accumMs = 0;
  });
});

// 프로그레스바 클릭
document.getElementById('progress-bar-bg').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  goTo(Math.round(ratio * (POINTS.length-1)));
});

// 고도차트 클릭
document.getElementById('elev-chart').addEventListener('click', e => {
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  goTo(Math.round(ratio * (POINTS.length-1)));
});

// 초기화
goTo(0);
</script>
</body>
</html>

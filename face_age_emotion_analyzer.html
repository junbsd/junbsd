
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

body, .wrap { font-family: 'Noto Sans KR', sans-serif; }

.wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1.5rem 1rem;
  min-height: 100vh;
  background: var(--color-background-tertiary);
}

h1 {
  font-size: 20px;
  font-weight: 500;
  color: var(--color-text-primary);
  margin-bottom: 0.4rem;
  text-align: center;
}

.subtitle {
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-bottom: 1.25rem;
  text-align: center;
}

.video-container {
  position: relative;
  width: 100%;
  max-width: 480px;
  border-radius: 16px;
  overflow: hidden;
  border: 0.5px solid var(--color-border-secondary);
  background: #000;
  aspect-ratio: 3/4;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  display: block;
}

#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
  pointer-events: none;
}

.start-btn {
  margin-top: 1.25rem;
  padding: 14px 40px;
  font-size: 15px;
  font-weight: 500;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--color-text-primary);
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: 12px;
  cursor: pointer;
  transition: background 0.15s;
}
.start-btn:hover { background: var(--color-background-secondary); }
.start-btn:active { transform: scale(0.98); }

.results-area {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  max-width: 480px;
  margin-top: 1.25rem;
}

.face-card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 16px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 16px;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.face-avatar {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
}

.face-avatar.male { background: #E6F1FB; }
.face-avatar.female { background: #FBEAF0; }
.face-avatar.unknown { background: #F1EFE8; }

.face-info { flex: 1; min-width: 0; }

.face-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--color-text-tertiary);
  letter-spacing: 0.04em;
  margin-bottom: 2px;
}

.face-age {
  font-size: 22px;
  font-weight: 500;
  color: var(--color-text-primary);
  line-height: 1.2;
}

.face-emotion {
  font-size: 13px;
  color: var(--color-text-secondary);
  margin-top: 4px;
}

.emotion-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  font-weight: 500;
  padding: 3px 10px;
  border-radius: 20px;
  margin-top: 6px;
}

.badge-happy { background: #EAF3DE; color: #3B6D11; }
.badge-sad { background: #E6F1FB; color: #0C447C; }
.badge-angry { background: #FCEBEB; color: #A32D2D; }
.badge-surprised { background: #FAEEDA; color: #854F0B; }
.badge-neutral { background: #F1EFE8; color: #5F5E5A; }
.badge-fearful { background: #EEEDFE; color: #3C3489; }
.badge-disgusted { background: #FBEAF0; color: #72243E; }

.status-msg {
  font-size: 13px;
  color: var(--color-text-secondary);
  text-align: center;
  padding: 0.5rem;
}

.loading-dots span {
  display: inline-block;
  animation: blink 1.2s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

.fps-label {
  font-size: 11px;
  color: var(--color-text-tertiary);
  text-align: center;
  margin-top: 6px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>

<div class="wrap">
  <h1>얼굴 나이 & 감정 분석</h1>
  <p class="subtitle">카메라를 켜면 실시간으로 분석해드려요</p>

  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <button class="start-btn" id="startBtn" onclick="startCamera()">카메라 켜기</button>

  <div class="results-area" id="results">
    <p class="status-msg" id="statusMsg">카메라를 켜면 분석을 시작해요</p>
  </div>

  <p class="fps-label" id="fpsLabel"></p>
</div>

<script>
const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');
const resultsEl = document.getElementById('results');
const statusEl = document.getElementById('statusMsg');
const fpsEl = document.getElementById('fpsLabel');
const startBtn = document.getElementById('startBtn');

let running = false;
let modelLoaded = false;
let frameCount = 0;
let lastFpsTime = Date.now();

const EMOTION_MAP = {
  happy:     { label: '행복해 보여요', badge: 'badge-happy', icon: '😊' },
  sad:       { label: '슬퍼 보여요', badge: 'badge-sad', icon: '😢' },
  angry:     { label: '화가 나 보여요', badge: 'badge-angry', icon: '😠' },
  surprised: { label: '놀란 것 같아요', badge: 'badge-surprised', icon: '😮' },
  neutral:   { label: '무표정이에요', badge: 'badge-neutral', icon: '😐' },
  fearful:   { label: '두려워 보여요', badge: 'badge-fearful', icon: '😨' },
  disgusted: { label: '싫은 표정이에요', badge: 'badge-disgusted', icon: '😖' },
};

const AGE_COMMENT = (age, gender) => {
  if (age < 10) return '앳된 얼굴이네요!';
  if (age < 20) return '활기찬 10대 같아요!';
  if (age < 30) return '젊고 생기 넘쳐요!';
  if (age < 40) return '30대의 매력이 있어요!';
  if (age < 50) return '40대 미남미녀 같아요!';
  if (age < 60) return '세월의 품격이 느껴져요!';
  return '연륜이 깊어 보여요!';
};

async function loadModels() {
  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
  statusEl.innerHTML = '모델 불러오는 중<span class="loading-dots"><span>.</span><span>.</span><span>.</span></span>';
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
    await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
    modelLoaded = true;
    statusEl.textContent = '모델 준비 완료! 얼굴을 화면에 보여주세요.';
  } catch (e) {
    statusEl.textContent = '모델 로딩 실패. 잠시 후 다시 시도해 주세요.';
    console.error(e);
  }
}

async function startCamera() {
  try {
    startBtn.textContent = '카메라 연결 중...';
    startBtn.disabled = true;
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 854 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
    };
    startBtn.style.display = 'none';
    running = true;
    if (!modelLoaded) await loadModels();
    detectLoop();
  } catch (e) {
    startBtn.textContent = '카메라 켜기';
    startBtn.disabled = false;
    statusEl.textContent = '카메라 접근이 거부됐어요. 브라우저 설정을 확인해 주세요.';
  }
}

async function detectLoop() {
  if (!running) return;

  if (modelLoaded && video.readyState >= 2) {
    const dets = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 }))
      .withAgeAndGender()
      .withFaceExpressions();

    ctx.clearRect(0, 0, overlay.width, overlay.height);

    if (dets.length === 0) {
      statusEl.textContent = '얼굴이 감지되지 않아요. 카메라 앞으로 와주세요!';
      resultsEl.innerHTML = '<p class="status-msg" id="statusMsg">얼굴이 감지되지 않아요. 카메라 앞으로 와주세요!</p>';
    } else {
      statusEl.textContent = '';
      let html = '';
      dets.forEach((det, idx) => {
        const box = det.detection.box;
        const age = Math.round(det.age);
        const gender = det.gender;
        const genderProb = Math.round(det.genderProbability * 100);

        const expressions = det.expressions;
        const topEmotion = Object.entries(expressions).sort((a, b) => b[1] - a[1])[0][0];
        const em = EMOTION_MAP[topEmotion] || EMOTION_MAP.neutral;

        const isM = gender === 'male';
        const genderLabel = isM ? '남성' : '여성';
        const genderIcon = isM ? '👨' : '👩';
        const avatarClass = isM ? 'male' : 'female';
        const comment = AGE_COMMENT(age, gender);

        const boxColor = isM ? '#378ADD' : '#D4537E';
        ctx.strokeStyle = boxColor;
        ctx.lineWidth = 2;
        ctx.strokeRect(box.x, box.y, box.width, box.height);

        ctx.fillStyle = boxColor;
        ctx.fillRect(box.x, box.y - 24, 80, 24);
        ctx.fillStyle = '#fff';
        ctx.font = '13px sans-serif';
        ctx.fillText(`${genderLabel} · ${age}세`, box.x + 6, box.y - 7);

        html += `
          <div class="face-card">
            <div class="face-avatar ${avatarClass}">${genderIcon}</div>
            <div class="face-info">
              <div class="face-label">${idx + 1}번째 얼굴 · ${genderLabel} (${genderProb}%)</div>
              <div class="face-age">${age}살처럼 보여요</div>
              <div class="face-emotion">${comment}</div>
              <span class="emotion-badge ${em.badge}">${em.icon} ${em.label}</span>
            </div>
          </div>`;
      });
      resultsEl.innerHTML = html;
    }

    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) {
      fpsEl.textContent = `분석 속도: ${frameCount} fps`;
      frameCount = 0;
      lastFpsTime = now;
    }
  }

  setTimeout(() => requestAnimationFrame(detectLoop), 500);
}
</script>

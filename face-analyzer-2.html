<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Face Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Sans','Noto Sans KR',sans-serif;}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#overlay{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;}

.top-bar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,16px) 16px 12px;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);}
.app-title{font-size:16px;font-weight:500;color:#fff;}
.lang-switcher{display:flex;gap:6px;}
.lang-btn{padding:5px 11px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.lang-btn.active{background:rgba(255,255,255,0.92);color:#111;border-color:transparent;}

.start-overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);gap:16px;}
.start-icon{font-size:52px;}
.start-text{font-size:16px;color:rgba(255,255,255,0.85);text-align:center;line-height:1.7;}
.start-btn{margin-top:8px;padding:14px 40px;font-size:15px;font-weight:500;font-family:'Noto Sans','Noto Sans KR',sans-serif;color:#111;background:#fff;border:none;border-radius:50px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.start-btn:active{transform:scale(0.97);}
.tip-badge{margin-top:4px;padding:6px 14px;font-size:12px;color:rgba(255,255,255,0.6);background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:20px;text-align:center;}

.bottom-results{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 12px calc(env(safe-area-inset-bottom,12px) + 12px);background:linear-gradient(to top,rgba(0,0,0,0.72) 80%,transparent);display:none;flex-direction:column;gap:8px;}
.status-msg{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;padding:8px 0;}
.cards-row{display:flex;flex-direction:column;gap:8px;}
.face-card{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:0.5px solid rgba(255,255,255,0.2);border-radius:14px;padding:10px 14px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.face-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.face-avatar.male{background:rgba(55,138,221,0.35);}
.face-avatar.female{background:rgba(212,83,126,0.35);}
.face-info{flex:1;min-width:0;}
.face-label{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:1px;}
.face-age{font-size:19px;font-weight:500;color:#fff;line-height:1.2;}
.face-sub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px;}
.emotion-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;margin-top:5px;}
.badge-happy{background:rgba(99,153,34,0.3);color:#c5e87a;}
.badge-sad{background:rgba(24,95,165,0.3);color:#85b7eb;}
.badge-angry{background:rgba(163,45,45,0.3);color:#f09595;}
.badge-surprised{background:rgba(133,79,11,0.3);color:#fac775;}
.badge-neutral{background:rgba(95,94,90,0.3);color:#d3d1c7;}
.badge-fearful{background:rgba(83,74,183,0.3);color:#afa9ec;}
.badge-disgusted{background:rgba(153,53,86,0.3);color:#ed93b1;}
.fps-bar{font-size:10px;color:rgba(255,255,255,0.3);text-align:right;padding:2px 4px;}

.cards-row.multi{flex-direction:row;}
.cards-row.multi .face-card{flex:1;min-width:0;padding:8px 10px;}
.cards-row.multi .face-avatar{width:36px;height:36px;font-size:18px;}
.cards-row.multi .face-age{font-size:15px;}
.cards-row.multi .face-sub{display:none;}
</style>
</head>
<body>
<div class="app">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div class="top-bar">
    <span class="app-title" id="appTitle">얼굴 분석</span>
    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('vi')">VI</button>
    </div>
  </div>

  <div class="start-overlay" id="startOverlay">
    <div class="start-icon">📷</div>
    <p class="start-text" id="startText">카메라를 켜면<br>나이와 감정을 분석해드려요</p>
    <button class="start-btn" id="startBtn" onclick="startCamera()">카메라 켜기</button>
    <div class="tip-badge" id="tipBadge">📏 팔을 뻗으면 두 명이 함께 찍을 수 있어요</div>
  </div>

  <div class="bottom-results" id="results">
    <div class="fps-bar" id="fpsBar"></div>
    <div class="cards-row" id="cards"></div>
    <p class="status-msg" id="statusMsg"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script>
const LANGS={
  ko:{title:'얼굴 분석',startText:'카메라를 켜면<br>나이와 감정을 분석해드려요',startBtn:'카메라 켜기',tip:'📏 팔을 뻗으면 두 명이 함께 찍을 수 있어요',loading:'모델 불러오는 중...',ready:'얼굴을 화면에 보여주세요',noFace:'얼굴이 감지되지 않아요',male:'남성',female:'여성',ageSuffix:'살',ageLike:'처럼 보여요',faceLabel:(i)=>`${i}번째 얼굴`,ageComment:(a)=>a<10?'앳된 얼굴이에요!':a<20?'활기찬 10대 같아요!':a<30?'젊고 생기 넘쳐요!':a<40?'30대의 매력이 있어요!':a<50?'40대 미남미녀 같아요!':a<60?'세월의 품격이 느껴져요!':'연륜이 깊어 보여요!',emotions:{happy:'행복해 보여요 😊',sad:'슬퍼 보여요 😢',angry:'화가 나 보여요 😠',surprised:'놀란 것 같아요 😮',neutral:'무표정이에요 😐',fearful:'두려워 보여요 😨',disgusted:'싫은 표정이에요 😖'},fps:(n)=>`분석: ${n}fps`,camErr:'카메라 접근이 거부됐어요.<br>브라우저 설정을 확인해 주세요.'},
  en:{title:'Face Analyzer',startText:'Tap to start<br>and analyze faces in real time',startBtn:'Start Camera',tip:'📏 Stretch your arm — two people can fit!',loading:'Loading models...',ready:'Show your face to the camera',noFace:'No face detected',male:'Male',female:'Female',ageSuffix:'yrs',ageLike:' old',faceLabel:(i)=>`Face ${i}`,ageComment:(a)=>a<10?'Such a young face!':a<20?'Full of youthful energy!':a<30?'Fresh & glowing!':a<40?'Charming 30s vibes!':a<50?'Fabulous in your 40s!':a<60?'Graceful and distinguished!':'Wisdom written on your face!',emotions:{happy:'Looks happy 😊',sad:'Looks sad 😢',angry:'Looks angry 😠',surprised:'Looks surprised 😮',neutral:'Neutral expression 😐',fearful:'Looks fearful 😨',disgusted:'Looks disgusted 😖'},fps:(n)=>`${n}fps`,camErr:'Camera access denied.<br>Please check browser settings.'},
  vi:{title:'Phân tích khuôn mặt',startText:'Bật camera để phân tích<br>tuổi và cảm xúc theo thời gian thực',startBtn:'Bật camera',tip:'📏 Giơ tay ra — hai người cùng chụp được!',loading:'Đang tải mô hình...',ready:'Hãy hướng khuôn mặt vào camera',noFace:'Không phát hiện khuôn mặt',male:'Nam',female:'Nữ',ageSuffix:'tuổi',ageLike:'',faceLabel:(i)=>`Khuôn mặt ${i}`,ageComment:(a)=>a<10?'Khuôn mặt non nớt!':a<20?'Tuổi teen tràn đầy năng lượng!':a<30?'Tươi trẻ và rạng rỡ!':a<40?'Sức hút tuổi 30!':a<50?'Phong độ tuổi 40!':a<60?'Phong trần và bền bỉ!':'Sự khôn ngoan của tuổi tác!',emotions:{happy:'Trông vui vẻ 😊',sad:'Trông buồn 😢',angry:'Trông tức giận 😠',surprised:'Trông ngạc nhiên 😮',neutral:'Biểu cảm trung tính 😐',fearful:'Trông sợ hãi 😨',disgusted:'Trông ghê tởm 😖'},fps:(n)=>`${n}fps`,camErr:'Quyền truy cập camera bị từ chối.<br>Vui lòng kiểm tra cài đặt trình duyệt.'}
};

const BADGE_CLASS={happy:'badge-happy',sad:'badge-sad',angry:'badge-angry',surprised:'badge-surprised',neutral:'badge-neutral',fearful:'badge-fearful',disgusted:'badge-disgusted'};

function detectBrowserLang(){
  const nav=navigator.language||(navigator.languages&&navigator.languages[0])||'en';
  const c=nav.toLowerCase();
  if(c.startsWith('ko'))return'ko';
  if(c.startsWith('vi'))return'vi';
  return'en';
}

let lang=detectBrowserLang();
let modelLoaded=false,running=false,frameCount=0,lastFpsTime=Date.now();

function setLang(l){
  lang=l;const t=LANGS[l];
  document.getElementById('appTitle').textContent=t.title;
  document.getElementById('startText').innerHTML=t.startText;
  document.getElementById('startBtn').textContent=t.startBtn;
  const tip=document.getElementById('tipBadge');if(tip)tip.textContent=t.tip;
  document.querySelectorAll('.lang-btn').forEach(b=>{
    const map={'한국어':'ko','EN':'en','VI':'vi'};
    b.classList.toggle('active',map[b.textContent.trim()]===l);
  });
}

const video=document.getElementById('video');
const overlay=document.getElementById('overlay');
const ctx=overlay.getContext('2d');

function syncOverlay(){overlay.width=video.videoWidth;overlay.height=video.videoHeight;}

async function loadModels(){
  document.getElementById('statusMsg').textContent=LANGS[lang].loading;
  const URL='https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
  await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
  await faceapi.nets.ageGenderNet.loadFromUri(URL);
  await faceapi.nets.faceExpressionNet.loadFromUri(URL);
  modelLoaded=true;
  document.getElementById('statusMsg').textContent=LANGS[lang].ready;
}

async function startCamera(){
  const btn=document.getElementById('startBtn');
  btn.textContent='...';

  // 가장 넓은 화각을 얻기 위한 constraints
  // 16:9 가로 비율 + 최소 zoom + 높은 해상도
  const constraints={
    video:{
      facingMode:'user',
      width:{ideal:1920,min:640},
      height:{ideal:1080,min:480},
      aspectRatio:{ideal:16/9},
    },
    audio:false
  };

  try{
    const stream=await navigator.mediaDevices.getUserMedia(constraints);

    // zoom 지원 기기에서는 최솟값으로 강제 설정
    try{
      const track=stream.getVideoTracks()[0];
      const caps=track.getCapabilities();
      if(caps&&caps.zoom){
        await track.applyConstraints({advanced:[{zoom:caps.zoom.min}]});
      }
    }catch(e){console.log('zoom not supported');}

    video.srcObject=stream;
    video.onloadedmetadata=syncOverlay;
    video.addEventListener('resize',syncOverlay);

    document.getElementById('startOverlay').style.display='none';
    const results=document.getElementById('results');
    results.style.display='flex';
    results.style.flexDirection='column';
    running=true;
    if(!modelLoaded)await loadModels();
    detectLoop();
  }catch(e){
    btn.textContent=LANGS[lang].startBtn;
    document.getElementById('startText').innerHTML=LANGS[lang].camErr;
    console.error(e);
  }
}

async function detectLoop(){
  if(!running)return;
  const t=LANGS[lang];

  if(modelLoaded&&video.readyState>=2){
    const dets=await faceapi
      .detectAllFaces(video,new faceapi.TinyFaceDetectorOptions({inputSize:512,scoreThreshold:0.3}))
      .withAgeAndGender()
      .withFaceExpressions();

    ctx.clearRect(0,0,overlay.width,overlay.height);
    const cards=document.getElementById('cards');
    const sm=document.getElementById('statusMsg');

    if(!dets.length){
      sm.textContent=t.noFace;
      cards.innerHTML='';
      cards.className='cards-row';
    }else{
      sm.textContent='';
      const isMulti=dets.length>1;
      cards.className='cards-row'+(isMulti?' multi':'');

      // mirror된 화면 기준 왼→오른쪽 정렬 (box.x 내림차순)
      const sorted=[...dets].sort((a,b)=>b.detection.box.x-a.detection.box.x);

      let html='';
      sorted.forEach((det,idx)=>{
        const box=det.detection.box;
        const age=Math.round(det.age);
        const isM=det.gender==='male';
        const genderLabel=isM?t.male:t.female;
        const genderProb=Math.round(det.genderProbability*100);
        const topEmotion=Object.entries(det.expressions).sort((a,b)=>b[1]-a[1])[0][0];
        const emotionLabel=t.emotions[topEmotion]||t.emotions.neutral;
        const badgeCls=BADGE_CLASS[topEmotion]||'badge-neutral';
        const comment=t.ageComment(age);
        const avatarCls=isM?'male':'female';
        const icon=isM?'👨':'👩';
        const boxColor=isM?'#378ADD':'#D4537E';

        ctx.strokeStyle=boxColor;
        ctx.lineWidth=2.5;
        ctx.strokeRect(box.x,box.y,box.width,box.height);

        const labelText=`${genderLabel} · ${age}${lang==='en'?' yrs':'세'}`;
        ctx.font='bold 13px sans-serif';
        const lw=ctx.measureText(labelText).width+14;
        ctx.fillStyle=boxColor;
        ctx.fillRect(box.x,box.y-28,lw,26);
        ctx.fillStyle='#fff';
        ctx.fillText(labelText,box.x+7,box.y-10);

        html+=`<div class="face-card">
          <div class="face-avatar ${avatarCls}">${icon}</div>
          <div class="face-info">
            <div class="face-label">${t.faceLabel(idx+1)} · ${genderLabel} (${genderProb}%)</div>
            <div class="face-age">${age} ${t.ageSuffix}${t.ageLike}</div>
            <div class="face-sub">${comment}</div>
            <span class="emotion-badge ${badgeCls}">${emotionLabel}</span>
          </div>
        </div>`;
      });
      cards.innerHTML=html;
    }

    frameCount++;
    const now=Date.now();
    if(now-lastFpsTime>=1000){
      document.getElementById('fpsBar').textContent=t.fps(frameCount);
      frameCount=0;lastFpsTime=now;
    }
  }
  setTimeout(()=>requestAnimationFrame(detectLoop),500);
}

setLang(lang);
</script>
</body>
</html>

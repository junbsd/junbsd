<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VibeCheck ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;--card:#13131a;--card2:#1a1a24;
  --a1:#ff3cac;--a2:#784ba0;--a3:#2b86c5;--a4:#ffda44;--a5:#00f5a0;
  --tx:#f0f0f0;--tx2:#aaaacc;--r:20px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;
  transition:transform .4s cubic-bezier(.77,0,.18,1),opacity .4s;
  transform:translateX(100%);opacity:0;pointer-events:none;}
.screen.active{transform:translateX(0);opacity:1;pointer-events:all;}
.screen.exit{transform:translateX(-100%);opacity:0;}
#home{background:var(--bg);}
.blob{position:absolute;border-radius:50%;filter:blur(80px);animation:blobMove 8s ease-in-out infinite alternate;}
.blob1{width:300px;height:300px;background:rgba(255,60,172,.25);top:-80px;left:-80px;}
.blob2{width:250px;height:250px;background:rgba(43,134,197,.2);bottom:-60px;right:-60px;animation-delay:-3s;}
.blob3{width:200px;height:200px;background:rgba(0,245,160,.15);top:40%;left:30%;animation-delay:-5s;}
@keyframes blobMove{from{transform:scale(1) translate(0,0)}to{transform:scale(1.2) translate(20px,20px)}}
.home-content{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;padding:0 16px 20px;}
.home-header{padding:44px 0 10px;text-align:center;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;
  background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.tagline{font-size:12px;color:var(--tx2);margin-top:3px;letter-spacing:2px;text-transform:uppercase;}
.lang-bar{display:flex;gap:8px;justify-content:center;margin:10px 0;}
.lang-btn{padding:5px 14px;border-radius:50px;border:1.5px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.05);color:var(--tx2);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;transition:.2s;}
.lang-btn.active{border-color:var(--a1);color:var(--a1);background:rgba(255,60,172,.1);}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1;overflow-y:auto;padding-bottom:8px;}
.menu-grid::-webkit-scrollbar{display:none;}
.mc{border-radius:var(--r);padding:16px 14px;display:flex;flex-direction:column;gap:6px;cursor:pointer;
  position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.07);
  transition:transform .15s;min-height:115px;justify-content:space-between;}
.mc:active{transform:scale(.95);}
.mc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.06),transparent);pointer-events:none;}
.mc-icon{font-size:28px;}.mc-label{font-size:13px;font-weight:800;line-height:1.3;}.mc-sub{font-size:10px;opacity:.55;font-weight:600;}
.c1{background:linear-gradient(135deg,#1a0a14,#2d0f22);box-shadow:0 4px 20px rgba(255,60,172,.2);}
.c2{background:linear-gradient(135deg,#0a0f1a,#0f1e30);box-shadow:0 4px 20px rgba(43,134,197,.2);}
.c3{background:linear-gradient(135deg,#0a160f,#0f2d1a);box-shadow:0 4px 20px rgba(0,245,160,.2);}
.c4{background:linear-gradient(135deg,#1a160a,#2d260f);box-shadow:0 4px 20px rgba(255,218,68,.2);}
.c5{background:linear-gradient(135deg,#160a1a,#250f2d);box-shadow:0 4px 20px rgba(120,75,160,.2);}
.c6{background:linear-gradient(135deg,#0a1416,#0f252d);box-shadow:0 4px 20px rgba(0,220,200,.2);}
.c7{background:linear-gradient(135deg,#16100a,#2d200f);box-shadow:0 4px 20px rgba(255,140,50,.2);}
.c8{background:linear-gradient(135deg,#100a16,#1e0f2d);box-shadow:0 4px 20px rgba(200,100,255,.2);}
.feat-screen{background:var(--bg);}
.feat-header{padding:50px 16px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.back-btn{width:38px;height:38px;border-radius:50%;background:var(--card);border:none;
  color:var(--tx);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.feat-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;flex:1;}
.feat-body{flex:1;overflow-y:auto;padding:0 16px 40px;}
.feat-body::-webkit-scrollbar{display:none;}
/* CAMERA */
.cam-wrap{position:relative;width:100%;border-radius:18px;overflow:hidden;background:#000;aspect-ratio:3/4;}
.cam-wrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.cam-frame{position:absolute;inset:10px;border:2px solid rgba(255,60,172,.6);border-radius:12px;pointer-events:none;}
.cam-frame::before,.cam-frame::after{content:'';position:absolute;width:22px;height:22px;border-color:var(--a1);border-style:solid;}
.cam-frame::before{top:-2px;left:-2px;border-width:3px 0 0 3px;}
.cam-frame::after{bottom:-2px;right:-2px;border-width:0 3px 3px 0;}
.scan-line{position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--a1),transparent);
  animation:scanMove 2s linear infinite;pointer-events:none;}
@keyframes scanMove{0%{top:10%}100%{top:90%}}
.snap-preview{width:100%;border-radius:18px;overflow:hidden;aspect-ratio:3/4;}
.snap-preview img{width:100%;height:100%;object-fit:cover;display:block;}
.cam-btn-row{display:flex;gap:10px;margin-top:12px;}
/* CARD */
.card{background:var(--card);border-radius:var(--r);padding:18px;margin-bottom:14px;border:1px solid rgba(255,255,255,.06);}
.card-title{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx2);margin-bottom:12px;}
/* BTN */
.btn{width:100%;padding:15px;border-radius:14px;border:none;font-family:'Nunito',sans-serif;
  font-size:15px;font-weight:800;cursor:pointer;transition:.15s;letter-spacing:.3px;}
.btn:active{transform:scale(.97);}
.btn-primary{background:linear-gradient(135deg,var(--a1),var(--a2));color:#fff;}
.btn-secondary{background:linear-gradient(135deg,var(--a3),#1a5a8a);color:#fff;}
.btn-green{background:linear-gradient(135deg,var(--a5),#00a870);color:#000;}
.btn-yellow{background:linear-gradient(135deg,var(--a4),#ffa500);color:#000;}
.btn-dark{background:rgba(255,255,255,.08);color:var(--tx);border:1px solid rgba(255,255,255,.1);flex:1;}
/* INP */
.inp{width:100%;padding:13px 15px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);
  background:var(--card2);color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;
  outline:none;margin-bottom:10px;transition:.2s;}
.inp:focus{border-color:var(--a1);}
.inp::placeholder{color:rgba(255,255,255,.3);}
textarea.inp{resize:none;height:90px;}
.result-box{background:var(--card2);border-radius:14px;padding:18px;font-size:14px;
  line-height:1.7;border-left:3px solid var(--a1);color:var(--tx);}
.ebar{margin:7px 0;}
.ebar-label{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:4px;}
.bar-track{height:9px;background:rgba(255,255,255,.08);border-radius:50px;overflow:hidden;}
.bar-fill{height:100%;border-radius:50px;transition:width 1s cubic-bezier(.34,1.56,.64,1);}
.fortune-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.fortune-item{background:var(--card2);border-radius:12px;padding:12px;text-align:center;}
.fortune-cat{font-size:10px;color:var(--tx2);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.fortune-val{font-size:14px;font-weight:800;margin-top:4px;}
#react-area{width:100%;height:210px;border-radius:18px;display:flex;align-items:center;
  justify-content:center;flex-direction:column;gap:10px;cursor:pointer;font-size:18px;font-weight:800;transition:.2s;user-select:none;}
.rw{background:var(--card2);}.rg{background:linear-gradient(135deg,var(--a5),#00a870);}
.rm{background:linear-gradient(135deg,var(--a1),var(--a2));}.rx{background:linear-gradient(135deg,#ff4444,#aa0000);}
.roul-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;}
.tag-list{display:flex;flex-wrap:wrap;gap:7px;margin:8px 0;}
.tag{padding:6px 12px;border-radius:50px;background:var(--card2);font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;}
.tag .del{color:var(--a1);cursor:pointer;font-size:15px;line-height:1;}
.add-row{display:flex;gap:8px;}
.add-row .inp{flex:1;margin:0;}
.add-btn{padding:13px 16px;border-radius:12px;border:none;background:var(--a1);color:#fff;font-size:18px;cursor:pointer;}
.mbti-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.mbti-sel{padding:12px;border-radius:12px;border:1.5px solid rgba(255,255,255,.1);
  background:var(--card2);color:var(--tx);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;width:100%;}
.q-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.q-opt{padding:13px;border-radius:13px;border:1.5px solid rgba(255,255,255,.1);
  background:var(--card2);color:var(--tx);font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:.15s;}
.q-opt:active{transform:scale(.96);}
.q-opt.selected{border-color:var(--a1);background:rgba(255,60,172,.15);}
.palette-display{display:flex;gap:8px;justify-content:center;margin:14px 0;}
.palette-swatch{flex:1;height:75px;border-radius:12px;display:flex;align-items:flex-end;
  justify-content:center;padding-bottom:7px;font-size:10px;font-weight:700;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.7);}
.progress-bar{height:5px;background:rgba(255,255,255,.1);border-radius:50px;overflow:hidden;margin-bottom:14px;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--a1),var(--a3));border-radius:50px;transition:width .4s;}
.step-count{font-size:11px;color:var(--tx2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.chat-bubble-wrap{display:flex;flex-direction:column;gap:10px;margin:10px 0;}
.bubble-me{align-self:flex-end;max-width:82%;padding:11px 15px;border-radius:18px;border-bottom-right-radius:4px;background:#ffda44;color:#222;font-size:14px;line-height:1.5;font-weight:600;}
.job-card{background:var(--card2);border-radius:13px;padding:14px;display:flex;align-items:center;gap:12px;margin-bottom:9px;border-left:3px solid var(--a3);}
.job-icon{font-size:28px;flex-shrink:0;}
.job-info{flex:1;}
.job-name{font-size:15px;font-weight:800;}
.job-desc{font-size:11px;color:var(--tx2);margin-top:3px;}
.job-match{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--a5);}
.recap-card{background:linear-gradient(135deg,var(--card),var(--card2));border-radius:18px;padding:22px;text-align:center;border:1px solid rgba(255,255,255,.08);}
.recap-emoji{font-size:44px;margin-bottom:10px;}
.recap-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-bottom:7px;}
.recap-desc{font-size:13px;color:var(--tx2);line-height:1.6;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:34px;background:linear-gradient(135deg,var(--a1),var(--a3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-lbl{font-size:10px;color:var(--tx2);font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.music-tags{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0;}
.music-tag{padding:7px 13px;border-radius:50px;border:1.5px solid rgba(255,255,255,.1);
  background:transparent;color:var(--tx);font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.music-tag.sel{background:var(--a1);border-color:var(--a1);color:#fff;}
.loc-badge{display:inline-flex;align-items:center;gap:6px;background:var(--card2);
  border-radius:50px;padding:7px 14px;font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:14px;}
.celeb-pct{font-family:'Bebas Neue',sans-serif;font-size:70px;
  background:linear-gradient(135deg,var(--a1),var(--a4));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
.tab-row{display:flex;gap:0;background:var(--card2);border-radius:11px;padding:4px;margin-bottom:12px;}
.tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;
  color:var(--tx2);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:.2s;}
.tab.active{background:var(--a1);color:#fff;}
.share-row{display:flex;gap:9px;margin-top:10px;}
.share-btn{flex:1;padding:11px;border-radius:11px;border:1.5px solid rgba(255,255,255,.1);
  background:transparent;color:var(--tx);font-size:12px;font-weight:800;cursor:pointer;transition:.15s;}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--a1);
  border-radius:50%;animation:spin .7s linear infinite;margin:18px auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;flex-direction:column;align-items:center;padding:24px 0;}
.loading-text{font-size:13px;color:var(--tx2);font-weight:700;margin-top:8px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(30,30,40,.95);border:1px solid rgba(255,255,255,.1);color:#fff;
  padding:11px 22px;border-radius:50px;font-size:13px;font-weight:700;opacity:0;
  transition:.3s;z-index:10000;white-space:nowrap;backdrop-filter:blur(10px);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.sep{height:1px;background:rgba(255,255,255,.06);margin:14px 0;}
.hidden{display:none!important;}
.face-pct-row{display:flex;justify-content:center;gap:22px;margin-top:14px;}
.face-pct-item{text-align:center;}
.face-pct-num{font-family:'Bebas Neue',sans-serif;font-size:38px;}
.face-pct-lbl{font-size:11px;color:var(--tx2);font-weight:700;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div style="position:absolute;inset:0;overflow:hidden;">
    <div class="blob blob1"></div><div class="blob blob2"></div><div class="blob blob3"></div>
  </div>
  <div class="home-content">
    <div class="home-header">
      <div class="logo">VibeCheck</div>
      <div class="tagline" id="ht"></div>
      <div class="lang-bar">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('vi')">VI</button>
        <button class="lang-btn" onclick="setLang('ko')">한국어</button>
      </div>
    </div>
    <div class="menu-grid">
      <div class="mc c1" onclick="goTo('emotion')"><div class="mc-icon">😤</div><div><div class="mc-label" id="mm_emotion"></div><div class="mc-sub">📷 Camera AI</div></div></div>
      <div class="mc c2" onclick="goTo('celeb')"><div class="mc-icon">🌟</div><div><div class="mc-label" id="mm_celeb"></div><div class="mc-sub">📷 Camera AI</div></div></div>
      <div class="mc c3" onclick="goTo('dogcat')"><div class="mc-icon">🐾</div><div><div class="mc-label" id="mm_dogcat"></div><div class="mc-sub">📷 Camera AI</div></div></div>
      <div class="mc c4" onclick="goTo('job')"><div class="mc-icon">💼</div><div><div class="mc-label" id="mm_job"></div><div class="mc-sub">📷 Camera AI</div></div></div>
      <div class="mc c5" onclick="goTo('fortune')"><div class="mc-icon">🔮</div><div><div class="mc-label" id="mm_fortune"></div><div class="mc-sub">📷 Camera AI</div></div></div>
      <div class="mc c6" onclick="goTo('chat')"><div class="mc-icon">💌</div><div><div class="mc-label" id="mm_chat"></div><div class="mc-sub">Text AI</div></div></div>
      <div class="mc c7" onclick="goTo('menuv')"><div class="mc-icon">🍕</div><div><div class="mc-label" id="mm_menu"></div><div class="mc-sub">Text AI</div></div></div>
      <div class="mc c8" onclick="goTo('mbti')"><div class="mc-icon">🧠</div><div><div class="mc-label" id="mm_mbti"></div><div class="mc-sub">MBTI AI</div></div></div>
      <div class="mc c1" onclick="goTo('react')"><div class="mc-icon">⚡</div><div><div class="mc-label" id="mm_react"></div><div class="mc-sub">Tap Game</div></div></div>
      <div class="mc c2" onclick="goTo('music')"><div class="mc-icon">🎵</div><div><div class="mc-label" id="mm_music"></div><div class="mc-sub">Genre AI</div></div></div>
      <div class="mc c3" onclick="goTo('location')"><div class="mc-icon">🗺️</div><div><div class="mc-label" id="mm_loc"></div><div class="mc-sub">GPS AI</div></div></div>
      <div class="mc c4" onclick="goTo('roulette')"><div class="mc-icon">🎲</div><div><div class="mc-label" id="mm_roul"></div><div class="mc-sub">Custom List</div></div></div>
      <div class="mc c5" onclick="goTo('recap')"><div class="mc-icon">📊</div><div><div class="mc-label" id="mm_recap"></div><div class="mc-sub">Text AI</div></div></div>
      <div class="mc c6" onclick="goTo('kakaostyle')"><div class="mc-icon">💬</div><div><div class="mc-label" id="mm_kakao"></div><div class="mc-sub">Text AI</div></div></div>
      <div class="mc c7" onclick="goTo('palette')"><div class="mc-icon">🌈</div><div><div class="mc-label" id="mm_palette"></div><div class="mc-sub">Quiz AI</div></div></div>
    </div>
  </div>
</div>

<!-- CAMERA SCREENS (emotion / celeb / dogcat / job / fortune) -->
<!-- Generated by JS for each cam feature -->
<div id="emotion" class="screen feat-screen"></div>
<div id="celeb" class="screen feat-screen"></div>
<div id="dogcat" class="screen feat-screen"></div>
<div id="job" class="screen feat-screen"></div>
<div id="fortune" class="screen feat-screen"></div>

<!-- CHAT -->
<div id="chat" class="screen feat-screen">
  <div class="feat-header"><button class="back-btn" onclick="goHome()">←</button><div class="feat-title" id="ft_chat"></div></div>
  <div class="feat-body">
    <div class="card">
      <div class="card-title" id="cd_chat"></div>
      <input class="inp" id="chat-target" placeholder="상대방 특징 (예: 커피 좋아하는 직장동료)">
      <input class="inp" id="chat-situation" placeholder="상황 (예: 처음 카톡을 보내고 싶어)">
      <div class="tab-row">
        <button class="tab active" onclick="setChatStyle('cute',this)" id="ts_cute"></button>
        <button class="tab" onclick="setChatStyle('funny',this)" id="ts_funny"></button>
        <button class="tab" onclick="setChatStyle('cool',this)" id="ts_cool"></button>
      </div>
      <button class="btn btn-primary" onclick="generateFlirt()" id="btn_chat"></button>
    </div>
    <div class="card hidden" id="chat-result"></div>
  </div>
</div>

<!-- MENU VERDICT -->
<div id="menuv" class="screen feat-screen">
  <div class="feat-header"><button class="back-btn" onclick="goHome()">←</button><div class="feat-title" id="ft_menu"></div></div>
  <div class="feat-body">
    <div class="card">
      <div class="card-title" id="cd_menu"></div>
      <input class="inp" id="menu-a" placeholder="선택지 1 (예: 치킨)">
      <input class="inp" id="menu-b" placeholder="선택지 2 (예: 피자)">
      <input class="inp" id="menu-reason" placeholder="지금 상황 (예: 야식, 친구들이랑)">
      <button class="btn btn-yellow" onclick="getVerdict()" id="btn_verdict"></button>
    </div>
    <div class="card hidden" id="menu-result"></div>
  </div>
</div>

<!-- MBTI -->
<div id="mbti" class="screen feat-screen">
  <div class="feat-header"><button class="back-btn" onclick="goHome()">←</button><div class="feat-title" id="ft_mbti"></div></div>
  <div class="feat-body">
    <div class="card">
      <div class="card-title" id="cd_mbti"></div>
      <div class="mbti-grid">
        <div>
          <div style="font-size:11px;color:var(--tx2);font-weight:700;margin-bottom:5px;" id="lbl_my_mbti"></div>
          <select class="mbti-sel" id="mbti-a"><option value="">...</option>
            <option>INTJ</option><option>INTP</option><option>ENTJ</option><option>ENTP</option>

const snapData={};
async function startCam(id){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false
    });
    streams[id]=stream;
    const vid=document.getElementById('vid-'+id);
    if(vid){vid.srcObject=stream;}
  }catch(e){showToast(lang==='ko'?'카메라 접근 실패 😢':lang==='vi'?'Không thể truy cập camera 😢':'Camera access failed 😢');}
}
function stopCam(id){
  if(streams[id]){streams[id].getTracks().forEach(t=>t.stop());delete streams[id];}
}
function snapCam(id){
  const vid=document.getElementById('vid-'+id);
  if(!vid||!streams[id]){showToast('카메라가 준비되지 않았어요 📷');return;}
  const cnv=document.createElement('canvas');
  cnv.width=vid.videoWidth||640;cnv.height=vid.videoHeight||480;
  cnv.getContext('2d').drawImage(vid,0,0);
  const dataURL=cnv.toDataURL('image/jpeg',0.85);
  snapData[id]=dataURL.split(',')[1];
  document.getElementById('img-'+id).src=dataURL;
  document.getElementById('live-'+id).classList.add('hidden');
  document.getElementById('prev-'+id).classList.remove('hidden');
  document.getElementById('btn1-'+id).classList.add('hidden');
  document.getElementById('btn2-'+id).classList.remove('hidden');
}
function retakeCam(id){
  snapData[id]=null;
  document.getElementById('live-'+id).classList.remove('hidden');
  document.getElementById('prev-'+id).classList.add('hidden');
  document.getElementById('btn1-'+id).classList.remove('hidden');
  document.getElementById('btn2-'+id).classList.add('hidden');
  const res=document.getElementById('res-'+id);
  if(res){res.classList.add('hidden');res.innerHTML='';}
}

async function callAI(prompt, system, imageBase64){
  const sys=system||`You are a fun, trendy AI assistant. Always respond in ${LL()}. Be concise and entertaining. Use emojis.`;
  const content=imageBase64
    ?[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:imageBase64}},{type:'text',text:prompt}]
    :prompt;
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1024,
      system:sys,
      messages:[{role:'user',content}]
    })
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  const d=await res.json();
  return d.content[0].text;
}

function parseJSON(txt){
  return JSON.parse(txt.replace(/```json\s*|\s*```/g,'').trim());
}

function setLoading(el){
  const msg=lang==='ko'?'AI가 분석 중... ✨':lang==='vi'?'AI đang phân tích... ✨':'AI analyzing... ✨';
  el.innerHTML=`<div class="loading-wrap"><div class="spinner"></div><div class="loading-text">${msg}</div></div>`;
  el.classList.remove('hidden');
}

let reactState='idle',reactStart=0,reactTimer=null,reactScores=[];
function reactTap(){
  const area=document.getElementById('react-area');
  const txt=document.getElementById('react-text');
  const sub=document.getElementById('react-sub');
  if(reactState==='idle'||reactState==='done'){
    reactState='waiting';area.className='rw';
    txt.textContent=lang==='ko'?'초록불 켜지면 탭!':lang==='vi'?'Chạm khi đèn xanh!':'Wait for GREEN!';
    sub.textContent='';
    document.getElementById('react-score-wrap').classList.add('hidden');
    reactTimer=setTimeout(()=>{
      reactState='ready';area.className='rg';
      txt.textContent='NOW! ⚡';sub.textContent='TAP TAP TAP';reactStart=Date.now();
    },1500+Math.random()*3000);
  }else if(reactState==='waiting'){
    clearTimeout(reactTimer);reactState='done';area.className='rx';
    txt.textContent=lang==='ko'?'너무 빨리! 😅':lang==='vi'?'Quá sớm! 😅':'Too Early! 😅';
    sub.textContent=lang==='ko'?'다시 탭해서 시작':lang==='vi'?'Chạm để thử lại':'Tap to retry';
  }else if(reactState==='ready'){
    const ms=Date.now()-reactStart;reactState='done';reactScores.push(ms);
    area.className='rm';txt.textContent='✅';sub.textContent='';
    const grade=ms<200?'⚡ 천재!':ms<300?'🔥 빠르다!':ms<450?'👍 보통':ms<600?'🐢 느림':'😴 많이 느림';
    document.getElementById('react-time').textContent=ms+'ms';
    document.getElementById('react-grade').textContent=grade;
    document.getElementById('react-history').innerHTML=reactScores.map(s=>`<div style="background:var(--card2);border-radius:8px;padding:5px 10px;font-size:12px;font-weight:700;">${s}ms</div>`).join('');
    document.getElementById('react-score-wrap').classList.remove('hidden');
  }
}
function resetReact(){
  reactState='idle';reactScores=[];
  document.getElementById('react-area').className='rw';
  document.getElementById('react-text').textContent=t('react_wait');
  document.getElementById('react-sub').textContent=t('react_tap');
  document.getElementById('react-score-wrap').classList.add('hidden');
}

// ROULETTE
// ══════════════════════════════════════════
let roulItems=['치킨','피자','삼겹살','라멘','초밥'];
const RC=['#ff3cac','#784ba0','#2b86c5','#ffda44','#00f5a0','#ff7043','#ab47bc','#29b6f6','#66bb6a','#ffa726'];
function renderRoulTags(){
  document.getElementById('roul-tags').innerHTML=roulItems.map((item,i)=>`<div class="tag">${item}<span class="del" onclick="removeRoul(${i})">×</span></div>`).join('');
  drawWheel(0);
}
function addRoulItem(){const inp=document.getElementById('roul-inp');if(!inp.value.trim()){showToast('메뉴를 입력해주세요!');return;}roulItems.push(inp.value.trim());inp.value='';renderRoulTags();}
function removeRoul(i){roulItems.splice(i,1);renderRoulTags();}
function drawWheel(angle){
  const canvas=document.getElementById('roul-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');const items=roulItems.length?roulItems:['?'];const n=items.length;const arc=2*Math.PI/n;
  ctx.clearRect(0,0,240,240);
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(120,120);ctx.arc(120,120,116,angle+i*arc,angle+(i+1)*arc);
    ctx.fillStyle=RC[i%RC.length];ctx.fill();
    ctx.save();ctx.translate(120,120);ctx.rotate(angle+(i+0.5)*arc);
    ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font='bold 12px Nunito';
    ctx.fillText(items[i].length>8?items[i].substring(0,7)+'…':items[i],105,5);ctx.restore();
  }
}
let roulSpinning=false;
function spinRoulette(){
  if(roulSpinning||!roulItems.length){showToast('메뉴를 추가해주세요!');return;}
  roulSpinning=true;document.getElementById('roul-result').textContent='';
  const total=Math.random()*2*Math.PI+10*Math.PI;const st=Date.now();const dur=3000;
  function anim(){
    const el=Date.now()-st;const tn=Math.min(el/dur,1);const ease=1-Math.pow(1-tn,4);
    const cur=total*ease;drawWheel(cur);
    if(tn<1){requestAnimationFrame(anim);}
    else{
      roulSpinning=false;const fin=cur%(2*Math.PI);const n=roulItems.length;const arc=2*Math.PI/n;
      const norm=(((-fin%(2*Math.PI))+2*Math.PI+Math.PI/2)%(2*Math.PI));
      const idx=Math.floor(norm/arc)%n;
      document.getElementById('roul-result').textContent='🎉 '+roulItems[idx]+'!';
    }
  }
  anim();
}

   opts:[{ko:'☀️ 맑음',en:'☀️ Sunny',vi:'☀️ Nắng'},{ko:'🌧️ 비',en:'🌧️ Rainy',vi:'🌧️ Mưa'},{ko:'⛅ 흐림',en:'⛅ Cloudy',vi:'⛅ Có mây'},{ko:'⚡ 천둥',en:'⚡ Thunder',vi:'⚡ Sấm'}]},
  {q:{ko:'나를 표현하는 시간대?',en:'Your time of day?',vi:'Thời điểm nào là bạn?'},
   opts:[{ko:'🌅 새벽',en:'🌅 Dawn',vi:'🌅 Bình minh'},{ko:'☀️ 낮',en:'☀️ Noon',vi:'☀️ Trưa'},{ko:'🌆 저녁',en:'🌆 Evening',vi:'🌆 Chiều'},{ko:'🌙 밤',en:'🌙 Night',vi:'🌙 Đêm'}]},

  {q:{ko:'나의 에너지는?',en:'Your energy?',vi:'Năng lượng của bạn?'},
   opts:[{ko:'🔥 불꽃',en:'🔥 Fire',vi:'🔥 Lửa'},{ko:'🌊 파도',en:'🌊 Wave',vi:'🌊 Sóng'},{ko:'🌸 꽃',en:'🌸 Flower',vi:'🌸 Hoa'},{ko:'⭐ 별',en:'⭐ Star',vi:'⭐ Sao'}]},
  {q:{ko:'주말에 하고 싶은 것?',en:'Weekend plans?',vi:'Kế hoạch cuối tuần?'},
   opts:[{ko:'🎉 파티',en:'🎉 Party',vi:'🎉 Tiệc'},{ko:'📚 독서',en:'📚 Reading',vi:'📚 Đọc'},{ko:'🚴 모험',en:'🚴 Adventure',vi:'🚴 Phiêu lưu'},{ko:'🛋️ 휴식',en:'🛋️ Rest',vi:'🛋️ Nghỉ'}]}
];
const PM=[['#FF6B6B','#FFD93D'],['#4ECDC4','#45B7D1'],['#96CEB4','#88D8B0'],['#FF9FF3','#FF6B9D'],['#C7ECEE','#778CA3']];
let palStep=0,palAnswers=[];
function initPalette(){palStep=0;palAnswers=[];const r=document.getElementById('pal-result-wrap');if(r)r.classList.add('hidden');renderPalStep();}
function renderPalStep(){
  const q=PQ[palStep];const lk=lang==='ko'?'ko':lang==='vi'?'vi':'en';
  const sc=document.getElementById('pal-step-count');const pr=document.getElementById('pal-progress');const qq=document.getElementById('pal-question');const opts=document.getElementById('pal-options');
  if(!sc||!qq||!opts)return;
  sc.textContent=`${palStep+1} / ${PQ.length}`;
  pr.style.width=((palStep/PQ.length)*100)+'%';
  qq.textContent=q.q[lk];
  opts.innerHTML=q.opts.map((o,i)=>`<div class="q-opt" onclick="palSelect(${i})">${o[lk]}</div>`).join('');
}
async function palSelect(i){
  palAnswers.push(i);
  if(palStep<PQ.length-1){palStep++;renderPalStep();document.getElementById('pal-progress').style.width=((palStep/PQ.length)*100)+'%';}
  else{
    document.getElementById('pal-progress').style.width='100%';
    document.getElementById('pal-question').textContent='';
    document.getElementById('pal-options').innerHTML='<div class="spinner"></div>';
    const colors=palAnswers.map((a,s)=>PM[s]?PM[s][a%2]||PM[s][0]:'#ff3cac');
    try{
      const r=await callAI(`Palette: ${colors.join(', ')} for choices ${palAnswers.join(',')}. Write 2 poetic sentences about this person's color personality.`,`Color reader. Respond in ${LL()}.`);
      document.getElementById('pal-options').innerHTML='';
      document.getElementById('pal-swatches').innerHTML=colors.map(c=>`<div class="palette-swatch" style="background:${c}">${c}</div>`).join('');
      document.getElementById('pal-desc').textContent=r;
      document.getElementById('pal-result-wrap').classList.remove('hidden');
      document.getElementById('pal-step-count').textContent='Done ✨';
    }catch(e){document.getElementById('pal-options').innerHTML=`<div class="result-box" style="border-color:#ff4444;">❌ ${e.message}</div>`;}
  }
}

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Face Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500&family=Noto+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Noto Sans','Noto Sans KR',sans-serif;}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:#000;}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#overlay{position:absolute;inset:0;width:100%;height:100%;transform:scaleX(-1);pointer-events:none;}

.top-bar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top,16px) 16px 12px;background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent);}
.app-title{font-size:16px;font-weight:500;color:#fff;}
.lang-switcher{display:flex;gap:6px;}
.lang-btn{padding:5px 11px;font-size:12px;font-weight:500;border-radius:20px;border:1px solid rgba(255,255,255,0.35);background:rgba(255,255,255,0.12);color:#fff;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.lang-btn.active{background:rgba(255,255,255,0.92);color:#111;border-color:transparent;}

.start-overlay{position:absolute;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.78);gap:16px;}
.start-icon{font-size:52px;}
.start-text{font-size:16px;color:rgba(255,255,255,0.8);text-align:center;line-height:1.7;}
.start-btn{margin-top:8px;padding:14px 40px;font-size:15px;font-weight:500;font-family:'Noto Sans','Noto Sans KR',sans-serif;color:#111;background:#fff;border:none;border-radius:50px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.start-btn:active{transform:scale(0.97);}

.bottom-results{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 12px calc(env(safe-area-inset-bottom,12px) + 12px);background:linear-gradient(to top,rgba(0,0,0,0.72) 80%,transparent);display:flex;flex-direction:column;gap:8px;}
.status-msg{font-size:13px;color:rgba(255,255,255,0.6);text-align:center;padding:8px 0;}
.face-card{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.12);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:0.5px solid rgba(255,255,255,0.2);border-radius:14px;padding:10px 14px;animation:slideUp 0.25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.face-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.face-avatar.male{background:rgba(55,138,221,0.35);}
.face-avatar.female{background:rgba(212,83,126,0.35);}
.face-info{flex:1;min-width:0;}
.face-label{font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:1px;}
.face-age{font-size:20px;font-weight:500;color:#fff;line-height:1.2;}
.face-sub{font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px;}
.emotion-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;margin-top:5px;}
.badge-happy{background:rgba(99,153,34,0.3);color:#c5e87a;}
.badge-sad{background:rgba(24,95,165,0.3);color:#85b7eb;}
.badge-angry{background:rgba(163,45,45,0.3);color:#f09595;}
.badge-surprised{background:rgba(133,79,11,0.3);color:#fac775;}
.badge-neutral{background:rgba(95,94,90,0.3);color:#d3d1c7;}
.badge-fearful{background:rgba(83,74,183,0.3);color:#afa9ec;}
.badge-disgusted{background:rgba(153,53,86,0.3);color:#ed93b1;}
.fps-bar{font-size:10px;color:rgba(255,255,255,0.3);text-align:right;padding:2px 4px;}
</style>
</head>
<body>
<div class="app">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="overlay"></canvas>

  <div class="top-bar">
    <span class="app-title" id="appTitle">얼굴 분석</span>
    <div class="lang-switcher">
      <button class="lang-btn" onclick="setLang('ko')">한국어</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('vi')">VI</button>
    </div>
  </div>

  <div class="start-overlay" id="startOverlay">
    <div class="start-icon">📷</div>
    <p class="start-text" id="startText">카메라를 켜면<br>나이와 감정을 분석해드려요</p>
    <button class="start-btn" id="startBtn" onclick="startCamera()">카메라 켜기</button>
  </div>

  <div class="bottom-results" id="results" style="display:none;">
    <div class="fps-bar" id="fpsBar"></div>
    <div id="cards"></div>
    <p class="status-msg" id="statusMsg"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
<script>
const LANGS = {
  ko: {
    title: '얼굴 분석',
    startText: '카메라를 켜면<br>나이와 감정을 분석해드려요',
    startBtn: '카메라 켜기',
    loading: '모델 불러오는 중...',
    ready: '얼굴을 화면에 보여주세요',
    noFace: '얼굴이 감지되지 않아요',
    male: '남성', female: '여성',
    ageSuffix: '살처럼 보여요',
    faceLabel: (i) => `${i}번째 얼굴`,
    ageComment: (a) => a<10?'앳된 얼굴이에요!':a<20?'활기찬 10대 같아요!':a<30?'젊고 생기 넘쳐요!':a<40?'30대의 매력이 있어요!':a<50?'40대 미남미녀 같아요!':a<60?'세월의 품격이 느껴져요!':'연륜이 깊어 보여요!',
    emotions: { happy:'행복해 보여요 😊', sad:'슬퍼 보여요 😢', angry:'화가 나 보여요 😠', surprised:'놀란 것 같아요 😮', neutral:'무표정이에요 😐', fearful:'두려워 보여요 😨', disgusted:'싫은 표정이에요 😖' },
    fps: (n) => `분석: ${n}fps`,
    camErr: '카메라 접근이 거부됐어요. 브라우저 설정을 확인해 주세요.',
  },
  en: {
    title: 'Face Analyzer',
    startText: 'Tap to start the camera<br>and analyze faces in real time',
    startBtn: 'Start Camera',
    loading: 'Loading models...',
    ready: 'Show your face to the camera',
    noFace: 'No face detected',
    male: 'Male', female: 'Female',
    ageSuffix: 'years old',
    faceLabel: (i) => `Face ${i}`,
    ageComment: (a) => a<10?'Such a young face!':a<20?'Full of youthful energy!':a<30?'Looking fresh in your 20s!':a<40?'Charming 30s vibes!':a<50?'Fabulous in your 40s!':a<60?'Graceful and distinguished!':'Wisdom written on your face!',
    emotions: { happy:'Looks happy 😊', sad:'Looks sad 😢', angry:'Looks angry 😠', surprised:'Looks surprised 😮', neutral:'Neutral expression 😐', fearful:'Looks fearful 😨', disgusted:'Looks disgusted 😖' },
    fps: (n) => `${n}fps`,
    camErr: 'Camera access denied. Please check browser settings.',
  },
  vi: {
    title: 'Phân tích khuôn mặt',
    startText: 'Bật camera để phân tích<br>tuổi và cảm xúc theo thời gian thực',
    startBtn: 'Bật camera',
    loading: 'Đang tải mô hình...',
    ready: 'Hãy hướng khuôn mặt vào camera',
    noFace: 'Không phát hiện khuôn mặt',
    male: 'Nam', female: 'Nữ',
    ageSuffix: 'tuổi',
    faceLabel: (i) => `Khuôn mặt ${i}`,
    ageComment: (a) => a<10?'Khuôn mặt non nớt!':a<20?'Tuổi teen tràn đầy năng lượng!':a<30?'Tươi trẻ và rạng rỡ!':a<40?'Sức hút tuổi 30!':a<50?'Phong độ tuổi 40!':a<60?'Phong trần và bền bỉ!':'Sự khôn ngoan của tuổi tác!',
    emotions: { happy:'Trông vui vẻ 😊', sad:'Trông buồn 😢', angry:'Trông tức giận 😠', surprised:'Trông ngạc nhiên 😮', neutral:'Biểu cảm trung tính 😐', fearful:'Trông sợ hãi 😨', disgusted:'Trông ghê tởm 😖' },
    fps: (n) => `${n}fps`,
    camErr: 'Quyền truy cập camera bị từ chối. Vui lòng kiểm tra cài đặt trình duyệt.',
  }
};

const BADGE_CLASS = { happy:'badge-happy', sad:'badge-sad', angry:'badge-angry', surprised:'badge-surprised', neutral:'badge-neutral', fearful:'badge-fearful', disgusted:'badge-disgusted' };

function detectBrowserLang() {
  const nav = navigator.language || (navigator.languages && navigator.languages[0]) || 'en';
  const code = nav.toLowerCase();
  if (code.startsWith('ko')) return 'ko';
  if (code.startsWith('vi')) return 'vi';
  return 'en';
}

let lang = detectBrowserLang();
let modelLoaded = false, running = false;
let frameCount = 0, lastFpsTime = Date.now();

function setLang(l) {
  lang = l;
  const t = LANGS[l];
  document.getElementById('appTitle').textContent = t.title;
  document.getElementById('startText').innerHTML = t.startText;
  document.getElementById('startBtn').textContent = t.startBtn;
  document.querySelectorAll('.lang-btn').forEach(b => {
    const map = { '한국어':'ko', 'EN':'en', 'VI':'vi' };
    b.classList.toggle('active', map[b.textContent.trim()] === l);
  });
}

const video = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx = overlay.getContext('2d');

async function loadModels() {
  document.getElementById('statusMsg').textContent = LANGS[lang].loading;
  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
  await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
  await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
  await faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL);
  modelLoaded = true;
  document.getElementById('statusMsg').textContent = LANGS[lang].ready;
}

async function startCamera() {
  try {
    document.getElementById('startBtn').textContent = '...';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 1920 } },
      audio: false
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      overlay.width = video.videoWidth;
      overlay.height = video.videoHeight;
    };
    document.getElementById('startOverlay').style.display = 'none';
    const results = document.getElementById('results');
    results.style.display = 'flex';
    results.style.flexDirection = 'column';
    running = true;
    if (!modelLoaded) await loadModels();
    detectLoop();
  } catch(e) {
    document.getElementById('startBtn').textContent = LANGS[lang].startBtn;
    document.getElementById('startText').innerHTML = LANGS[lang].camErr;
  }
}

async function detectLoop() {
  if (!running) return;
  const t = LANGS[lang];
  if (modelLoaded && video.readyState >= 2) {
    const dets = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.4 }))
      .withAgeAndGender()
      .withFaceExpressions();

    ctx.clearRect(0, 0, overlay.width, overlay.height);
    const cards = document.getElementById('cards');
    const sm = document.getElementById('statusMsg');

    if (!dets.length) {
      sm.textContent = t.noFace;
      cards.innerHTML = '';
    } else {
      sm.textContent = '';
      let html = '';
      dets.forEach((det, idx) => {
        const box = det.detection.box;
        const age = Math.round(det.age);
        const isM = det.gender === 'male';
        const genderLabel = isM ? t.male : t.female;
        const genderProb = Math.round(det.genderProbability * 100);
        const topEmotion = Object.entries(det.expressions).sort((a,b)=>b[1]-a[1])[0][0];
        const emotionLabel = t.emotions[topEmotion] || t.emotions.neutral;
        const badgeCls = BADGE_CLASS[topEmotion] || 'badge-neutral';
        const comment = t.ageComment(age);
        const avatarCls = isM ? 'male' : 'female';
        const icon = isM ? '👨' : '👩';
        const boxColor = isM ? '#378ADD' : '#D4537E';

        ctx.strokeStyle = boxColor;
        ctx.lineWidth = 2.5;
        ctx.strokeRect(box.x, box.y, box.width, box.height);
        ctx.fillStyle = boxColor;
        ctx.fillRect(box.x, box.y - 26, 100, 26);
        ctx.fillStyle = '#fff';
        ctx.font = '13px sans-serif';
        ctx.fillText(`${genderLabel} · ${age}${lang==='en'?' yrs':'세'}`, box.x + 6, box.y - 8);

        html += `<div class="face-card">
          <div class="face-avatar ${avatarCls}">${icon}</div>
          <div class="face-info">
            <div class="face-label">${t.faceLabel(idx+1)} · ${genderLabel} (${genderProb}%)</div>
            <div class="face-age">${age} ${t.ageSuffix}</div>
            <div class="face-sub">${comment}</div>
            <span class="emotion-badge ${badgeCls}">${emotionLabel}</span>
          </div>
        </div>`;
      });
      cards.innerHTML = html;
    }

    frameCount++;
    const now = Date.now();
    if (now - lastFpsTime >= 1000) {
      document.getElementById('fpsBar').textContent = t.fps(frameCount);
      frameCount = 0;
      lastFpsTime = now;
    }
  }
  setTimeout(() => requestAnimationFrame(detectLoop), 500);
}

setLang(lang);
</script>
</body>
</html>

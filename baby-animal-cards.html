<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아기 동물 카드 🐾</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff9f0;
    font-family: 'Nunito', sans-serif;
    overflow-x: hidden;
  }

  .bg-dots {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #ffd6a520 2px, transparent 2px);
    background-size: 30px 30px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    padding: 36px 20px 16px;
    position: relative;
    z-index: 1;
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(2rem, 6vw, 3.2rem);
    color: #ff6b35;
    text-shadow: 3px 3px 0 #ffd166;
    letter-spacing: 1px;
  }

  header p {
    font-size: 1rem;
    color: #aaa;
    margin-top: 6px;
    font-weight: 700;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 24px 60px;
    position: relative;
    z-index: 1;
  }

  .card {
    background: white;
    border-radius: 32px;
    padding: 32px 24px 28px;
    text-align: center;
    box-shadow: 0 8px 0 0 #e0d5c8, 0 12px 30px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    position: relative;
    overflow: hidden;
    animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 14px 0 0 #e0d5c8, 0 20px 40px rgba(0,0,0,0.12);
  }

  .card:active {
    transform: translateY(2px) scale(0.98);
    box-shadow: 0 4px 0 0 #e0d5c8, 0 6px 16px rgba(0,0,0,0.08);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 8px;
    border-radius: 32px 32px 0 0;
  }

  .card[data-color="orange"]::before { background: linear-gradient(90deg, #ff6b35, #ffd166); }
  .card[data-color="pink"]::before   { background: linear-gradient(90deg, #f77fbe, #ff9de2); }
  .card[data-color="blue"]::before   { background: linear-gradient(90deg, #4cc9f0, #7bedff); }
  .card[data-color="green"]::before  { background: linear-gradient(90deg, #52d68a, #b5f7c3); }
  .card[data-color="purple"]::before { background: linear-gradient(90deg, #a78bfa, #c4b5fd); }
  .card[data-color="red"]::before    { background: linear-gradient(90deg, #f87171, #fca5a5); }
  .card[data-color="yellow"]::before { background: linear-gradient(90deg, #fbbf24, #fde68a); }
  .card[data-color="teal"]::before   { background: linear-gradient(90deg, #2dd4bf, #99f6e4); }
  .card[data-color="indigo"]::before { background: linear-gradient(90deg, #818cf8, #c7d2fe); }
  .card[data-color="rose"]::before   { background: linear-gradient(90deg, #fb7185, #fda4af); }
  .card[data-color="amber"]::before  { background: linear-gradient(90deg, #f59e0b, #fde68a); }
  .card[data-color="lime"]::before   { background: linear-gradient(90deg, #84cc16, #d9f99d); }

  .emoji {
    font-size: 90px;
    line-height: 1;
    display: block;
    margin-bottom: 16px;
    filter: drop-shadow(0 6px 8px rgba(0,0,0,0.12));
    animation: float 3s ease-in-out infinite;
    transition: transform 0.2s ease;
  }

  .card:hover .emoji {
    animation: bounce 0.5s ease;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-8px); }
  }

  @keyframes bounce {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.3) rotate(-5deg); }
    60%  { transform: scale(0.9) rotate(5deg); }
    100% { transform: scale(1); }
  }

  .ko {
    font-family: 'Baloo 2', cursive;
    font-size: 2rem;
    font-weight: 800;
    color: #2d2d2d;
    display: block;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }

  .en {
    font-size: 1.05rem;
    font-weight: 700;
    color: #888;
    display: block;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .vn {
    font-size: 1rem;
    font-weight: 700;
    display: block;
    padding: 4px 14px;
    border-radius: 20px;
    display: inline-block;
    margin-top: 8px;
  }

  .card[data-color="orange"] .vn { background: #fff3e0; color: #e65100; }
  .card[data-color="pink"] .vn   { background: #fce4ec; color: #c2185b; }
  .card[data-color="blue"] .vn   { background: #e3f2fd; color: #1565c0; }
  .card[data-color="green"] .vn  { background: #e8f5e9; color: #2e7d32; }
  .card[data-color="purple"] .vn { background: #ede7f6; color: #6a1b9a; }
  .card[data-color="red"] .vn    { background: #ffebee; color: #c62828; }
  .card[data-color="yellow"] .vn { background: #fffde7; color: #f57f17; }
  .card[data-color="teal"] .vn   { background: #e0f7fa; color: #00695c; }
  .card[data-color="indigo"] .vn { background: #e8eaf6; color: #283593; }
  .card[data-color="rose"] .vn   { background: #fce4ec; color: #ad1457; }
  .card[data-color="amber"] .vn  { background: #fff8e1; color: #e65100; }
  .card[data-color="lime"] .vn   { background: #f9fbe7; color: #558b2f; }

  .sound-btn {
    margin-top: 16px;
    background: none;
    border: 3px solid #f0ebe3;
    border-radius: 50px;
    padding: 8px 20px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    color: #bbb;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .sound-btn:hover {
    border-color: #ff6b35;
    color: #ff6b35;
    transform: scale(1.08);
  }

  footer {
    text-align: center;
    padding: 20px;
    color: #ccc;
    font-size: 0.85rem;
    font-weight: 700;
    position: relative;
    z-index: 1;
  }

  /* stagger animation delay */
  .card:nth-child(1)  { animation-delay: 0.05s; }
  .card:nth-child(2)  { animation-delay: 0.10s; }
  .card:nth-child(3)  { animation-delay: 0.15s; }
  .card:nth-child(4)  { animation-delay: 0.20s; }
  .card:nth-child(5)  { animation-delay: 0.25s; }
  .card:nth-child(6)  { animation-delay: 0.30s; }
  .card:nth-child(7)  { animation-delay: 0.35s; }
  .card:nth-child(8)  { animation-delay: 0.40s; }
  .card:nth-child(9)  { animation-delay: 0.45s; }
  .card:nth-child(10) { animation-delay: 0.50s; }
  .card:nth-child(11) { animation-delay: 0.55s; }
  .card:nth-child(12) { animation-delay: 0.60s; }
</style>
</head>
<body>
<div class="bg-dots"></div>

<header>
  <h1>🐾 동물 친구들</h1>
  <p>Động vật · Animals · 동물</p>
</header>

<div class="grid" id="grid"></div>

<footer>🍼 10개월 아기를 위한 동물 카드</footer>

<script>
const animals = [
  { emoji: '🐶', ko: '강아지',   en: 'Dog',      vn: 'Con chó',      sound: '멍멍!',   color: 'orange' },
  { emoji: '🐱', ko: '고양이',   en: 'Cat',      vn: 'Con mèo',      sound: '야옹!',   color: 'pink' },
  { emoji: '🐮', ko: '소',       en: 'Cow',      vn: 'Con bò',       sound: '음메!',   color: 'blue' },
  { emoji: '🐷', ko: '돼지',     en: 'Pig',      vn: 'Con lợn',      sound: '꿀꿀!',   color: 'rose' },
  { emoji: '🐸', ko: '개구리',   en: 'Frog',     vn: 'Con ếch',      sound: '개굴!',   color: 'green' },
  { emoji: '🐰', ko: '토끼',     en: 'Rabbit',   vn: 'Con thỏ',      sound: '깡총!',   color: 'purple' },
  { emoji: '🐻', ko: '곰',       en: 'Bear',     vn: 'Con gấu',      sound: '으르렁!', color: 'amber' },
  { emoji: '🐼', ko: '판다',     en: 'Panda',    vn: 'Con gấu trúc', sound: '판다!',   color: 'teal' },
  { emoji: '🐧', ko: '펭귄',     en: 'Penguin',  vn: 'Chim cánh cụt',sound: '뒤뚱!',  color: 'indigo' },
  { emoji: '🦁', ko: '사자',     en: 'Lion',     vn: 'Con sư tử',    sound: '어흥!',   color: 'yellow' },
  { emoji: '🐘', ko: '코끼리',   en: 'Elephant', vn: 'Con voi',      sound: '뿌우!',   color: 'lime' },
  { emoji: '🦆', ko: '오리',     en: 'Duck',     vn: 'Con vịt',      sound: '꽥꽥!',   color: 'red' },
];

const grid = document.getElementById('grid');

animals.forEach(a => {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.color = a.color;
  card.innerHTML = `
    <span class="emoji">${a.emoji}</span>
    <span class="ko">${a.ko}</span>
    <span class="en">${a.en}</span>
    <span class="vn">${a.vn}</span>
    <div>
      <button class="sound-btn" onclick="playSound(event, '${a.sound}', '${a.ko}')">
        🔊 ${a.sound}
      </button>
    </div>
  `;
  card.addEventListener('click', (e) => {
    if (e.target.closest('.sound-btn')) return;
    const emoji = card.querySelector('.emoji');
    emoji.style.animation = 'none';
    void emoji.offsetWidth;
    emoji.style.animation = 'bounce 0.5s ease, float 3s ease-in-out infinite 0.5s';
  });
  grid.appendChild(card);
});

function playSound(e, sound, name) {
  e.stopPropagation();
  if ('speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(name);
    utter.lang = 'ko-KR';
    utter.rate = 0.8;
    utter.pitch = 1.3;
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  }
  const btn = e.currentTarget;
  btn.style.transform = 'scale(1.2)';
  setTimeout(() => btn.style.transform = '', 300);
}
</script>
</body>
</html>

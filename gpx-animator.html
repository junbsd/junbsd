<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPX Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ed;--panel:#faf8f5;--border:#ddd8d0;
  --ink:#1a1814;--ink2:#6b6560;--accent:#c84b2f;--accent2:#2f6ec8;
  --mono:'DM Mono',monospace;--serif:'Fraunces',serif;--sidebar-w:330px;
}
body{
  font-family:var(--mono);background:var(--bg);color:var(--ink);
  height:100vh;display:grid;
  grid-template-columns:var(--sidebar-w) 1fr;
  grid-template-rows:52px 1fr;
  overflow:hidden;transition:grid-template-columns 0.32s ease;
}
body.sb-hidden{grid-template-columns:0px 1fr}

/* HEADER */
header{
  grid-column:1/-1;background:var(--ink);color:var(--bg);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  border-bottom:2px solid var(--accent);z-index:200;
}
header h1{font-family:var(--serif);font-weight:600;font-size:1.08rem;letter-spacing:-.01em;white-space:nowrap}
#sbToggle{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:#f5f2ed;width:32px;height:32px;border-radius:6px;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  transition:background .15s;flex-shrink:0
}
#sbToggle:hover{background:rgba(255,255,255,.18)}
.langs{display:flex;gap:4px;margin-left:auto}
.lb{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:#ccc;padding:3px 9px;border-radius:4px;font-family:var(--mono);
  font-size:.64rem;cursor:pointer;transition:all .15s;letter-spacing:.04em
}
.lb:hover{background:rgba(255,255,255,.18);color:#fff}
.lb.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* SIDEBAR */
#sidebar{
  background:var(--panel);border-right:1.5px solid var(--border);
  overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;
  transition:transform .32s ease,opacity .32s ease;width:var(--sidebar-w);
}
body.sb-hidden #sidebar{transform:translateX(-100%);opacity:0;pointer-events:none}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sec{border-bottom:1.5px solid var(--border);padding:13px 15px;flex-shrink:0}
.sec-title{
  font-size:.59rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink2);margin-bottom:10px;display:flex;align-items:center;gap:6px
}
.sec-title::before{
  content:'';display:inline-block;width:5px;height:5px;
  background:var(--accent);border-radius:50%;flex-shrink:0
}

/* DROP */
#dropzone{
  border:2px dashed var(--border);border-radius:6px;padding:20px 10px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s
}
#dropzone:hover,#dropzone.over{border-color:var(--accent);background:#fdf0ec}
#dropzone .icon{font-size:1.7rem;margin-bottom:5px}
#dropzone p{font-size:.69rem;color:var(--ink2);line-height:1.5}
#dropzone strong{color:var(--ink)}
#fileInput{display:none}
#fileInfo{
  display:none;margin-top:7px;background:#eef6ee;border:1px solid #b8dab8;
  border-radius:4px;padding:6px 8px;font-size:.65rem;color:#2d6b2d;line-height:1.65
}

/* CONTROLS */
.cr{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.cr:last-child{margin-bottom:0}
.cr label{font-size:.64rem;color:var(--ink2);display:flex;justify-content:space-between}
.cr label span{color:var(--ink);font-weight:500}
input[type=range]{width:100%;height:4px;accent-color:var(--accent);cursor:pointer}
input[type=color]{
  width:100%;height:29px;border:1.5px solid var(--border);border-radius:4px;
  cursor:pointer;padding:2px;background:#fff
}
select,input[type=number]{
  width:100%;height:28px;border:1.5px solid var(--border);border-radius:4px;
  padding:0 8px;font-family:var(--mono);font-size:.69rem;background:#fff;color:var(--ink);outline:none
}
select:focus,input:focus{border-color:var(--accent2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:7px}

/* MARKER PICKER */
.mk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:2px}
.mk-opt{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 3px 5px;border:1.5px solid var(--border);border-radius:6px;
  cursor:pointer;background:#fff;transition:border-color .15s,background .15s;
  font-size:.52rem;color:var(--ink2);user-select:none
}
.mk-opt:hover{border-color:var(--accent2);background:#f0f5ff}
.mk-opt.on{border-color:var(--accent);background:#fdf0ec;color:var(--accent);font-weight:500}
.mk-opt .mke{font-size:1.35rem;line-height:1}

/* STATS TOGGLES */
.st-toggle-grid{display:flex;flex-direction:column;gap:4px}
.st-tog{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;border:1.5px solid var(--border);border-radius:5px;
  background:#fff;cursor:pointer;transition:border-color .15s,background .15s;
  font-size:.64rem;color:var(--ink2)
}
.st-tog:hover{border-color:var(--accent2);background:#f5f8ff}
.st-tog.on{border-color:var(--accent);background:#fdf0ec;color:var(--ink)}
.st-tog .st-icon{font-size:.85rem;width:20px;text-align:center}
.st-tog .st-name{flex:1;margin-left:5px}
.tog-pill{
  width:28px;height:14px;border-radius:7px;background:var(--border);
  position:relative;transition:background .2s;flex-shrink:0
}
.tog-pill::after{
  content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;
  border-radius:50%;background:#fff;transition:transform .2s
}
.st-tog.on .tog-pill{background:var(--accent)}
.st-tog.on .tog-pill::after{transform:translateX(14px)}

/* BUTTONS */
.btn{
  width:100%;padding:8px;border:none;border-radius:4px;
  font-family:var(--mono);font-size:.69rem;font-weight:500;cursor:pointer;
  transition:opacity .15s,transform .1s;letter-spacing:.04em
}
.btn:active{transform:scale(.98)}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--ink);color:var(--bg)}
.btn-o{background:transparent;color:var(--ink);border:1.5px solid var(--border)}
.btn:disabled{opacity:.38;cursor:not-allowed}

/* PROGRESS */
#pgWrap{display:none;margin-top:8px}
#pgBar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
#pgFill{height:100%;background:var(--accent);width:0%;transition:width .1s}
#pgLabel{font-size:.61rem;color:var(--ink2);text-align:center}

/* MAP */
#mapWrap{position:relative;overflow:hidden;background:#e8e4de}
#map{width:100%;height:100%}

/* recording canvas overlay */
#recCanvas{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:5;display:none
}

#floatBtn{
  position:absolute;top:14px;left:14px;z-index:1000;
  background:var(--ink);color:var(--bg);border:none;
  width:36px;height:36px;border-radius:8px;font-size:1rem;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;
  align-items:center;justify-content:center
}
body.sb-hidden #floatBtn{display:flex}

#recBadge{
  display:none;position:absolute;top:14px;right:14px;
  background:var(--accent);color:#fff;font-size:.62rem;font-weight:500;
  padding:4px 10px;border-radius:20px;z-index:1000;letter-spacing:.08em;
  animation:blink 1s infinite
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.45}}

/* STATS OVERLAY */
#statsOverlay{
  display:none;position:absolute;bottom:28px;left:14px;
  background:rgba(14,12,10,.87);color:#f5f2ed;
  font-size:.68rem;padding:12px 16px;border-radius:10px;
  z-index:1000;backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.07);min-width:190px;
  pointer-events:none
}
.so-row{
  display:flex;justify-content:space-between;align-items:baseline;
  gap:18px;padding:3.5px 0;border-bottom:1px solid rgba(255,255,255,.06)
}
.so-row:last-child{border-bottom:none}
.so-lbl{color:#888;font-size:.58rem;letter-spacing:.06em;white-space:nowrap}
.so-val{color:#fff;font-weight:500;font-size:.7rem;text-align:right}

/* TOAST */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--ink);color:var(--bg);padding:7px 17px;
  border-radius:20px;font-size:.69rem;z-index:9999;
  transition:transform .3s;pointer-events:none;white-space:nowrap
}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header>
  <button id="sbToggle" onclick="toggleSB()">☰</button>
  <h1>GPX Animator</h1>
  <div class="langs">
    <button class="lb on" onclick="setLang('ko')">한국어</button>
    <button class="lb" onclick="setLang('en')">English</button>
    <button class="lb" onclick="setLang('vi')">Tiếng Việt</button>
  </div>
</header>

<aside id="sidebar">

  <!-- FILE -->
  <div class="sec">
    <div class="sec-title" data-i="sec_file">GPX 파일</div>
    <div id="dropzone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🗺</div>
      <p><strong data-i="drop_t">클릭하거나 파일을 드래그</strong><br><span data-i="drop_s">.gpx 파일을 업로드하세요</span></p>
    </div>
    <input type="file" id="fileInput" accept=".gpx">
    <div id="fileInfo"></div>
  </div>

  <!-- LINE -->
  <div class="sec">
    <div class="sec-title" data-i="sec_line">선 스타일</div>
    <div class="cr"><label><span data-i="lbl_lc">선 색상</span></label><input type="color" id="lineColor" value="#e63946"></div>
    <div class="cr"><label><span data-i="lbl_lw">선 두께</span><span id="lwV">4px</span></label><input type="range" id="lineWeight" min="1" max="12" value="4" step="0.5"></div>
    <div class="cr"><label><span data-i="lbl_lo">투명도</span><span id="loV">90%</span></label><input type="range" id="lineOpacity" min="10" max="100" value="90"></div>
    <div class="cr"><label><span data-i="lbl_ld">선 스타일</span></label>
      <select id="lineDash">
        <option value="solid" data-i="opt_solid">실선</option>
        <option value="dashed" data-i="opt_dashed">점선</option>
        <option value="dotted" data-i="opt_dotted">점</option>
      </select>
    </div>
  </div>

  <!-- MARKER -->
  <div class="sec">
    <div class="sec-title" data-i="sec_mk">마커</div>
    <div class="cr" style="margin-bottom:9px">
      <label><span data-i="lbl_mkt">마커 종류</span></label>
      <div class="mk-grid">
        <div class="mk-opt on" data-m="person" onclick="pickMarker(this)"><span class="mke">🚶</span><span data-i="mk_p">사람</span></div>
        <div class="mk-opt" data-m="bike" onclick="pickMarker(this)"><span class="mke">🚴</span><span data-i="mk_b">자전거</span></div>
        <div class="mk-opt" data-m="scooter" onclick="pickMarker(this)"><span class="mke">🛵</span><span data-i="mk_s">스쿠터</span></div>
        <div class="mk-opt" data-m="car" onclick="pickMarker(this)"><span class="mke">🚗</span><span data-i="mk_c">자동차</span></div>
      </div>
    </div>
    <div class="cr"><label><span data-i="lbl_mc">마커 색상</span></label><input type="color" id="markerColor" value="#e63946"></div>
    <div class="cr"><label><span data-i="lbl_ms">마커 크기</span><span id="msV">32px</span></label><input type="range" id="markerSize" min="20" max="64" value="32"></div>
    <div class="cr">
      <label><span data-i="lbl_tr">경로 표시</span></label>
      <select id="showTrail">
        <option value="full" data-i="opt_full">전체 경로</option>
        <option value="tail" data-i="opt_tail">꼬리만</option>
        <option value="none" data-i="opt_none">마커만</option>
      </select>
    </div>
    <div class="cr" id="tailRow" style="display:none">
      <label><span data-i="lbl_tl">꼬리 길이</span><span id="tlV">100</span></label>
      <input type="range" id="tailLen" min="10" max="500" value="100">
    </div>
  </div>

  <!-- STATS TOGGLES -->
  <div class="sec">
    <div class="sec-title" data-i="sec_st">통계 오버레이 항목</div>
    <div class="st-toggle-grid" id="statToggles">
      <!-- populated by JS -->
    </div>
  </div>

  <!-- ANIMATION -->
  <div class="sec">
    <div class="sec-title" data-i="sec_anim">애니메이션</div>
    <div class="cr"><label><span data-i="lbl_sp">속도</span><span id="spV">50 pt/f</span></label><input type="range" id="speed" min="1" max="200" value="50"></div>
    <div class="cr"><label><span>FPS</span><span id="fpsV">30</span></label><input type="range" id="fps" min="15" max="60" value="30" step="5"></div>
    <div class="cr"><label><span data-i="lbl_fm">팔로우 모드</span></label>
      <select id="followMode">
        <option value="follow" data-i="opt_fw">마커 따라가기</option>
        <option value="fit" data-i="opt_ft">전체 경로 고정</option>
      </select>
    </div>
    <div class="cr"><label><span data-i="lbl_sd">시작 대기</span><span id="sdV">1.0s</span></label><input type="range" id="startDelay" min="0" max="5" value="1" step="0.5"></div>
    <div class="cr"><label><span data-i="lbl_ed">종료 대기</span><span id="edV">2.0s</span></label><input type="range" id="endDelay" min="0" max="10" value="2" step="0.5"></div>
  </div>

  <!-- VIDEO -->
  <div class="sec">
    <div class="sec-title" data-i="sec_vid">영상 출력</div>
    <div class="cr"><label><span data-i="lbl_res">해상도</span></label>
      <select id="resPreset">
        <option value="1280x720">1280 × 720 (HD)</option>
        <option value="1920x1080" selected>1920 × 1080 (FHD)</option>
        <option value="2560x1440">2560 × 1440 (QHD)</option>
        <option value="3840x2160">3840 × 2160 (4K)</option>
        <option value="custom" data-i="opt_cus">직접 입력</option>
      </select>
    </div>
    <div class="two-col" id="cusRes" style="display:none">
      <div class="cr"><label><span data-i="lbl_w">너비</span></label><input type="number" id="cusW" value="1920" min="320" max="7680"></div>
      <div class="cr"><label><span data-i="lbl_h">높이</span></label><input type="number" id="cusH" value="1080" min="240" max="4320"></div>
    </div>
    <div class="cr"><label><span data-i="lbl_br">비트레이트</span><span id="brV">8 Mbps</span></label><input type="range" id="bitrate" min="2" max="40" value="8"></div>
  </div>

  <!-- RUN -->
  <div class="sec">
    <div class="sec-title" data-i="sec_run">실행</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="btn btn-o" id="previewBtn" disabled onclick="startPreview()">▶ <span data-i="btn_prev">미리보기</span></button>
      <button class="btn btn-p" id="recordBtn" disabled onclick="startRecording()">⏺ <span data-i="btn_rec">녹화 시작</span></button>
      <button class="btn btn-s" id="stopBtn" disabled onclick="stopRecording()">⏹ <span data-i="btn_stp">녹화 중지 &amp; 저장</span></button>
    </div>
    <div id="pgWrap"><div id="pgBar"><div id="pgFill"></div></div><div id="pgLabel"></div></div>
  </div>

</aside>

<div id="mapWrap">
  <div id="map"></div>
  <!-- recording canvas drawn on top of map -->
  <canvas id="recCanvas"></canvas>
  <button id="floatBtn" onclick="toggleSB()">☰</button>
  <div id="recBadge">● REC</div>
  <div id="statsOverlay" id="statsOverlay"></div>
</div>
<div id="toast"></div>

<script>

const dz=document.getElementById('dropzone');

function loadGPX(file){
  const r=new FileReader();
  r.onload=ev=>{
    try{
      gpxPoints=parseGPX(ev.target.result);
      if(!gpxPoints.length) throw new Error('No trackpoints found');
      gpxTotalDist=calcDist(gpxPoints);
      showFileInfo(file.name);
      fitMap(); drawGhost(); enableBtns();
      toast('✓ '+gpxPoints.length.toLocaleString()+t('toast_load'));
    }catch(e){toast('⚠ GPX error: '+e.message)}
  };
  r.readAsText(file);
}

function parseGPX(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  const pts=[];
  doc.querySelectorAll('trkpt,wpt,rtept').forEach(pt=>{
    const lat=parseFloat(pt.getAttribute('lat'));
    const lon=parseFloat(pt.getAttribute('lon'));
    if(!isNaN(lat)&&!isNaN(lon)){
      const ele=pt.querySelector('ele');
      const time=pt.querySelector('time');
      pts.push({lat,lon,
        ele:ele?parseFloat(ele.textContent):null,
        time:time?new Date(time.textContent):null
      });
    }
  });
  return pts;
}

function showFileInfo(name){
  const eles=gpxPoints.map(p=>p.ele).filter(e=>e!==null);
  const el=document.getElementById('fileInfo');
  el.style.display='block';
  el.innerHTML=`📄 ${name}<br>📍 ${gpxPoints.length.toLocaleString()} pts · 📏 ${(gpxTotalDist/1000).toFixed(2)} km`
    +(eles.length?` · ⛰ ${Math.min(...eles).toFixed(0)}–${Math.max(...eles).toFixed(0)} m`:'');
}

function calcDist(pts){
  let d=0; for(let i=1;i<pts.length;i++) d+=haversine(pts[i-1],pts[i]); return d;
}
function haversine(a,b){
  const R=6371000,dl=(b.lat-a.lat)*Math.PI/180,dL=(b.lon-a.lon)*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dL/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function calcBearing(a,b){
  const dL=(b.lon-a.lon)*Math.PI/180;
  const la=a.lat*Math.PI/180,lb=b.lat*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(lb);
  const x=Math.cos(la)*Math.sin(lb)-Math.sin(la)*Math.cos(lb)*Math.cos(dL);
  const deg=(Math.atan2(y,x)*180/Math.PI+360)%360;
  const dirs=['N','NE','E','SE','S','SW','W','NW'];
  return Math.round(deg)+'° '+dirs[Math.round(deg/45)%8];
}
function fmtTime(ms){
  const s=Math.floor(ms/1000);
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h?`${h}h ${m}m ${ss}s`:`${m}m ${ss}s`;
}

function da(style,w){

  if(style==='dotted') return [1,w*2];
  return null;
}

// ══════════════════════════════════════════════════
// STATS UPDATE
// ══════════════════════════════════════════════════
function updateStats(pts, idx, elapsed){
  if(!STAT_DEFS.some(d=>statEnabled[d.id])) return;
  const cur=pts[pts.length-1];
  const distSoFar=calcDist(pts);

  // speed: use last 2 pts if have time, else estimate
  let speedKmh=0;
  if(pts.length>=2){
    const prev=pts[pts.length-2];
    const d=haversine(prev,cur);
    if(cur.time&&prev.time){
      const dt=(cur.time-prev.time)/1000;
      speedKmh=dt>0?(d/dt)*3.6:0;
    } else {
      // estimate from animation: assume 1 frame gap
      const s=getS();
      const dtEstMs=1000/s.fps;
      speedKmh=(d/(dtEstMs/1000))*3.6;
    }
  }
  if(speedKmh>maxSpeedSeen) maxSpeedSeen=speedKmh;

  const avgSpeedKmh=elapsed>0?(distSoFar/(elapsed/3600000)):0;
  const pct=gpxPoints.length>0?((idx/gpxPoints.length)*100):0;
  const remain=gpxTotalDist-distSoFar;

  const eles=pts.map(p=>p.ele).filter(e=>e!==null);
  let altGain=0;
  for(let i=1;i<eles.length;i++) if(eles[i]>eles[i-1]) altGain+=eles[i]-eles[i-1];

  const sv=id=>{
    const el=document.getElementById('sv_'+id);
    if(!el) return;
    switch(id){
      case 'dist':   el.textContent=(distSoFar/1000).toFixed(2)+' km'; break;
      case 'pct':    el.textContent=pct.toFixed(1)+'%'; break;
      case 'pt':     el.textContent=idx+' / '+gpxPoints.length; break;
      case 'speed':  el.textContent=speedKmh.toFixed(1)+' km/h'; break;
      case 'avgspd': el.textContent=avgSpeedKmh.toFixed(1)+' km/h'; break;
      case 'maxspd': el.textContent=maxSpeedSeen.toFixed(1)+' km/h'; break;
      case 'time':   el.textContent=fmtTime(elapsed); break;
      case 'remain': el.textContent=(remain/1000).toFixed(2)+' km'; break;
      case 'alt':    el.textContent=eles.length?Math.round(eles[eles.length-1])+' m':'—'; break;
      case 'altmax': el.textContent=eles.length?Math.round(Math.max(...eles))+' m':'—'; break;
      case 'altmin': el.textContent=eles.length?Math.round(Math.min(...eles))+' m':'—'; break;
      case 'altgain':el.textContent=eles.length?Math.round(altGain)+' m':'—'; break;
      case 'lat':    el.textContent=cur.lat.toFixed(5)+'°'; break;
      case 'lon':    el.textContent=cur.lon.toFixed(5)+'°'; break;
      case 'bear':   el.textContent=pts.length>=2?calcBearing(pts[pts.length-2],cur):'—'; break;
    }
  };
  STAT_DEFS.filter(d=>statEnabled[d.id]).forEach(d=>sv(d.id));
}

// ══════════════════════════════════════════════════
// ANIMATION
// ══════════════════════════════════════════════════
function clearLayers(){
  if(animPolyline){map.removeLayer(animPolyline);animPolyline=null;}
  if(animMarker){map.removeLayer(animMarker);animMarker=null;}
}

function startPreview(){
  if(!gpxPoints.length) return;
  stopAnim(); clearLayers();
  animIndex=0; animPoints=[]; maxSpeedSeen=0; totalElapsed=0; lastTimestamp=null;
  const s=getS();
  if(drawnPolyline) map.removeLayer(drawnPolyline);
  drawnPolyline=L.polyline(gpxPoints.map(p=>[p.lat,p.lon]),{
    color:'#ddd',weight:s.lineWeight,opacity:.4,dashArray:da(s.lineDash,s.lineWeight)
  }).addTo(map);
  if(s.followMode==='fit') fitMap();
  const anyOn=STAT_DEFS.some(d=>statEnabled[d.id]);
  document.getElementById('statsOverlay').style.display=anyOn?'block':'none';
  renderStatsOverlay();
  setTimeout(()=>runAnim(s,false),s.startDelay*1000);
}

function runAnim(s,recording){
  const interval=1000/s.fps;
  let lastFrameTime=0;
  let animStartTime=null;

  function frame(ts){
    if(!animStartTime) animStartTime=ts;
    if(ts-lastFrameTime<interval){animFrame=requestAnimationFrame(frame);return;}
    lastFrameTime=ts;
    totalElapsed=ts-animStartTime;

    const step=Math.min(s.speed,gpxPoints.length-animIndex);
    for(let i=0;i<step&&animIndex<gpxPoints.length;i++) animPoints.push(gpxPoints[animIndex++]);

    // polyline
    if(animPolyline) map.removeLayer(animPolyline);
    let dPts=animPoints;
    if(s.showTrail==='tail') dPts=animPoints.slice(-s.tailLen);
    if(s.showTrail==='none') dPts=[];
    if(dPts.length>1){
      animPolyline=L.polyline(dPts.map(p=>[p.lat,p.lon]),{
        color:s.lineColor,weight:s.lineWeight,opacity:s.lineOpacity,
        dashArray:da(s.lineDash,s.lineWeight),lineCap:'round',lineJoin:'round'
      }).addTo(map);
    }

    // marker
    const cur=animPoints[animPoints.length-1];
    if(animMarker) map.removeLayer(animMarker);
    animMarker=makeMarker(cur.lat,cur.lon,s.markerType,s.markerSize,s.markerColor);
    animMarker.addTo(map);

    if(s.followMode==='follow') map.setView([cur.lat,cur.lon],map.getZoom(),{animate:true,duration:.3});

    // stats
    const anyOn=STAT_DEFS.some(d=>statEnabled[d.id]);
    document.getElementById('statsOverlay').style.display=anyOn?'block':'none';
    if(anyOn) updateStats(animPoints,animIndex,totalElapsed);

    if(animIndex<gpxPoints.length){
      animFrame=requestAnimationFrame(frame);
    } else {
      setTimeout(()=>{if(recording) stopRecording();},s.endDelay*1000);
    }
  }
  animFrame=requestAnimationFrame(frame);
}

function stopAnim(){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
}

// ══════════════════════════════════════════════════
// RECORDING — captures map container via html-to-canvas approach
// Uses the Leaflet canvas layer + a screenshot canvas
// ══════════════════════════════════════════════════
function startRecording(){
  if(!gpxPoints.length) return;
  stopAnim(); clearLayers();
  const s=getS();
  if(!window.MediaRecorder){toast('⚠ MediaRecorder not supported');return;}

  // With preferCanvas:true, Leaflet draws to a <canvas> inside the map pane
  // We try map pane canvas first, then fall back to mapWrap canvas
  const mapEl=document.getElementById('map');
  const mapWrapEl=document.getElementById('mapWrap');

  // Force map to re-render into canvas
  map.invalidateSize();

  // Find any canvas — could be inside .leaflet-canvas-pane or direct child
  let srcCanvas = mapEl.querySelector('canvas')
    || mapWrapEl.querySelector('canvas');

  if(!srcCanvas){
    // Last resort: create our own recording canvas and draw map tiles manually
    toast('⚠ Canvas 없음: 미리보기를 먼저 실행하거나 잠시 후 다시 시도하세요');
    return;
  }

  let stream;
  try{ stream=srcCanvas.captureStream(s.fps); }
  catch(e){ toast('⚠ captureStream 실패: '+e.message); return; }

  const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  const mimeType=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'';
  if(!mimeType){toast('⚠ 지원하는 비디오 포맷 없음');return;}

  recordedChunks=[];
  try{ mediaRecorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:s.bitrate*1_000_000}); }
  catch(e){toast('⚠ MediaRecorder 초기화 실패');return;}

  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
  mediaRecorder.onstop=saveVideo;
  mediaRecorder.start(100);
  isRecording=true;

  document.getElementById('recBadge').style.display='block';
  document.getElementById('recordBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  document.getElementById('pgWrap').style.display='block';
  document.getElementById('pgLabel').textContent=t('prog_rec');

  animIndex=0; animPoints=[]; maxSpeedSeen=0; totalElapsed=0;
  if(drawnPolyline) map.removeLayer(drawnPolyline);
  drawnPolyline=L.polyline(gpxPoints.map(p=>[p.lat,p.lon]),{
    color:'#ddd',weight:s.lineWeight,opacity:.35
  }).addTo(map);
  if(s.followMode==='fit') fitMap();
  const anyOn=STAT_DEFS.some(d=>statEnabled[d.id]);
  document.getElementById('statsOverlay').style.display=anyOn?'block':'none';
  renderStatsOverlay();

  const pi=setInterval(()=>{
    const pct=gpxPoints.length?animIndex/gpxPoints.length*100:0;
    document.getElementById('pgFill').style.width=pct+'%';
    document.getElementById('pgLabel').textContent=`${t('prog_rec')} ${pct.toFixed(0)}% (${animIndex}/${gpxPoints.length})`;
    if(animIndex>=gpxPoints.length) clearInterval(pi);
  },200);

  toast('⏺ '+t('toast_rec'));
  setTimeout(()=>runAnim(s,true),s.startDelay*1000);
}

function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
  stopAnim(); isRecording=false;
  document.getElementById('recBadge').style.display='none';
  document.getElementById('stopBtn').disabled=true;
  document.getElementById('recordBtn').disabled=false;
  document.getElementById('pgLabel').textContent=t('prog_save');
}

function saveVideo(){
  if(!recordedChunks.length){toast('⚠ 저장할 데이터 없음');return;}
  const mimeType=recordedChunks[0].type||'video/webm';
  const blob=new Blob(recordedChunks,{type:mimeType});
  const ext=mimeType.includes('mp4')?'mp4':'webm';
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='gpx-animation-'+Date.now()+'.'+ext;
  a.click(); URL.revokeObjectURL(url);
  document.getElementById('pgFill').style.width='100%';
  document.getElementById('pgLabel').textContent=`✓ ${t('prog_done')} (${(blob.size/1024/1024).toFixed(1)} MB)`;
  toast('✓ '+t('toast_saved'));
}

// ══════════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
window.addEventListener('resize',()=>map.invalidateSize());
setTimeout(()=>map.invalidateSize(),100);
buildStatToggles();
renderStatsOverlay();
applyI18n();
</script>

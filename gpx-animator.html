<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPX Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f2ed;--panel:#faf8f5;--border:#ddd8d0;
  --ink:#1a1814;--ink2:#6b6560;--accent:#c84b2f;--accent2:#2f6ec8;
  --mono:'DM Mono',monospace;--serif:'Fraunces',serif;--sw:330px;
}
body{
  font-family:var(--mono);background:var(--bg);color:var(--ink);
  height:100vh;display:grid;
  grid-template-columns:var(--sw) 1fr;
  grid-template-rows:52px 1fr;
  overflow:hidden;transition:grid-template-columns .32s ease;
}
body.sbh{grid-template-columns:0px 1fr}
header{
  grid-column:1/-1;background:var(--ink);color:var(--bg);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  border-bottom:2px solid var(--accent);z-index:200;
}
header h1{font-family:var(--serif);font-weight:600;font-size:1.08rem;letter-spacing:-.01em;white-space:nowrap}
#sbt{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:#f5f2ed;width:32px;height:32px;border-radius:6px;cursor:pointer;
  font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
#sbt:hover{background:rgba(255,255,255,.18)}
.langs{display:flex;gap:4px;margin-left:auto}
.lb{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:#ccc;
  padding:3px 9px;border-radius:4px;font-family:var(--mono);font-size:.63rem;cursor:pointer;transition:all .15s}
.lb:hover{background:rgba(255,255,255,.18);color:#fff}
.lb.on{background:var(--accent);border-color:var(--accent);color:#fff}

#sidebar{
  background:var(--panel);border-right:1.5px solid var(--border);
  overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;
  transition:transform .32s ease,opacity .32s ease;width:var(--sw);
}
body.sbh #sidebar{transform:translateX(-100%);opacity:0;pointer-events:none}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.sec{border-bottom:1.5px solid var(--border);padding:13px 15px;flex-shrink:0}
.stit{font-size:.58rem;font-weight:500;letter-spacing:.12em;text-transform:uppercase;
  color:var(--ink2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.stit::before{content:'';width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}

#dropzone{border:2px dashed var(--border);border-radius:6px;padding:20px 10px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s}
#dropzone:hover,#dropzone.over{border-color:var(--accent);background:#fdf0ec}
#dropzone .dzi{font-size:1.7rem;margin-bottom:5px}
#dropzone p{font-size:.68rem;color:var(--ink2);line-height:1.5}
#dropzone strong{color:var(--ink)}
#fi2{display:none}
#fileInfo{display:none;margin-top:7px;background:#eef6ee;border:1px solid #b8dab8;
  border-radius:4px;padding:6px 8px;font-size:.64rem;color:#2d6b2d;line-height:1.65}

.cr{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.cr:last-child{margin-bottom:0}
.cr label{font-size:.63rem;color:var(--ink2);display:flex;justify-content:space-between}
.cr label span{color:var(--ink);font-weight:500}
input[type=range]{width:100%;height:4px;accent-color:var(--accent);cursor:pointer}
input[type=color]{width:100%;height:29px;border:1.5px solid var(--border);border-radius:4px;cursor:pointer;padding:2px;background:#fff}
select,input[type=number]{width:100%;height:28px;border:1.5px solid var(--border);border-radius:4px;
  padding:0 8px;font-family:var(--mono);font-size:.69rem;background:#fff;color:var(--ink);outline:none}
select:focus,input:focus{border-color:var(--accent2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:7px}

.mk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:2px}
.mko{display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 3px 5px;
  border:1.5px solid var(--border);border-radius:6px;cursor:pointer;background:#fff;
  transition:border-color .15s,background .15s;font-size:.52rem;color:var(--ink2);user-select:none}
.mko:hover{border-color:var(--accent2);background:#f0f5ff}
.mko.on{border-color:var(--accent);background:#fdf0ec;color:var(--accent);font-weight:500}
.mko .mke{font-size:1.3rem;line-height:1}

.stg{display:flex;flex-direction:column;gap:4px}
.sto{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;
  border:1.5px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;
  transition:border-color .15s,background .15s;font-size:.63rem;color:var(--ink2)}
.sto:hover{border-color:var(--accent2);background:#f5f8ff}
.sto.on{border-color:var(--accent);background:#fdf0ec;color:var(--ink)}
.sto .si{font-size:.85rem;width:20px;text-align:center}
.sto .sn{flex:1;margin-left:5px}
.pill{width:28px;height:14px;border-radius:7px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.pill::after{content:'';position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:transform .2s}
.sto.on .pill{background:var(--accent)}
.sto.on .pill::after{transform:translateX(14px)}

.btn{width:100%;padding:8px;border:none;border-radius:4px;font-family:var(--mono);
  font-size:.69rem;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;letter-spacing:.04em}
.btn:active{transform:scale(.98)}
.bp{background:var(--accent);color:#fff}
.bs{background:var(--ink);color:var(--bg)}
.bo{background:transparent;color:var(--ink);border:1.5px solid var(--border)}
.btn:disabled{opacity:.38;cursor:not-allowed}

#pgW{display:none;margin-top:8px}
#pgB{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
#pgF{height:100%;background:var(--accent);width:0%;transition:width .1s}
#pgL{font-size:.6rem;color:var(--ink2);text-align:center}

#mapWrap{position:relative;overflow:hidden;background:#e8e4de}
#map{width:100%;height:100%}

/* The offscreen recording canvas sits OVER the map, shown only while recording */
#recCvs{position:absolute;top:0;left:0;width:100%;height:100%;display:none;z-index:10;pointer-events:none}

#fbt{position:absolute;top:14px;left:14px;z-index:1000;background:var(--ink);color:var(--bg);
  border:none;width:36px;height:36px;border-radius:8px;font-size:1rem;cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,.3);display:none;align-items:center;justify-content:center}
body.sbh #fbt{display:flex}

#recB{display:none;position:absolute;top:14px;right:14px;background:var(--accent);color:#fff;
  font-size:.62rem;font-weight:500;padding:4px 10px;border-radius:20px;z-index:1000;
  letter-spacing:.08em;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

#stOvl{display:none;position:absolute;bottom:28px;left:14px;
  background:rgba(12,10,8,.88);color:#f5f2ed;font-size:.68rem;
  padding:12px 16px;border-radius:10px;z-index:1000;backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.07);min-width:190px;pointer-events:none}
.sor{display:flex;justify-content:space-between;align-items:baseline;gap:18px;
  padding:3.5px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.sor:last-child{border-bottom:none}
.sol{color:#888;font-size:.57rem;letter-spacing:.06em;white-space:nowrap}
.sov{color:#fff;font-weight:500;font-size:.69rem;text-align:right}

#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--ink);color:var(--bg);padding:7px 17px;border-radius:20px;
  font-size:.69rem;z-index:9999;transition:transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<header>
  <button id="sbt" onclick="toggleSB()">☰</button>
  <h1>GPX Animator</h1>
  <div class="langs">
    <button class="lb on" onclick="setLang('ko')">한국어</button>
    <button class="lb" onclick="setLang('en')">English</button>
    <button class="lb" onclick="setLang('vi')">Tiếng Việt</button>
  </div>
</header>

<aside id="sidebar">
  <!-- FILE -->
  <div class="sec">
    <div class="stit" data-i="sec_file">GPX 파일</div>
    <div id="dropzone" onclick="document.getElementById('fi2').click()">
      <div class="dzi">🗺</div>
      <p><strong data-i="dt">클릭하거나 파일을 드래그</strong><br><span data-i="ds">.gpx 파일을 업로드하세요</span></p>
    </div>
    <input type="file" id="fi2" accept=".gpx">
    <div id="fileInfo"></div>
  </div>

  <!-- LINE -->
  <div class="sec">
    <div class="stit" data-i="sec_line">선 스타일</div>
    <div class="cr"><label><span data-i="lc">선 색상</span></label><input type="color" id="lineColor" value="#e63946"></div>
    <div class="cr"><label><span data-i="lw">선 두께</span><span id="lwV">4px</span></label><input type="range" id="lineWeight" min="1" max="12" value="4" step="0.5"></div>
    <div class="cr"><label><span data-i="lo">투명도</span><span id="loV">90%</span></label><input type="range" id="lineOpacity" min="10" max="100" value="90"></div>
    <div class="cr"><label><span data-i="ld">선 스타일</span></label>
      <select id="lineDash"><option value="solid" data-i="os">실선</option><option value="dashed" data-i="od">점선</option><option value="dotted" data-i="oo">점</option></select>
    </div>
  </div>

  <!-- MARKER -->
  <div class="sec">
    <div class="stit" data-i="sec_mk">마커</div>
    <div class="cr" style="margin-bottom:9px">
      <label><span data-i="mkt">마커 종류</span></label>
      <div class="mk-grid">
        <div class="mko on" data-m="person" onclick="pickM(this)"><span class="mke">🚶</span><span data-i="mp">사람</span></div>
        <div class="mko" data-m="bike" onclick="pickM(this)"><span class="mke">🚴</span><span data-i="mb">자전거</span></div>
        <div class="mko" data-m="scooter" onclick="pickM(this)"><span class="mke">🛵</span><span data-i="ms2">스쿠터</span></div>
        <div class="mko" data-m="car" onclick="pickM(this)"><span class="mke">🚗</span><span data-i="mc">자동차</span></div>
      </div>
    </div>
    <div class="cr"><label><span data-i="mkc">마커 색상</span></label><input type="color" id="markerColor" value="#e63946"></div>
    <div class="cr"><label><span data-i="mks">마커 크기</span><span id="msV">32px</span></label><input type="range" id="markerSize" min="20" max="64" value="32"></div>
    <div class="cr"><label><span data-i="tr">경로 표시</span></label>
      <select id="showTrail"><option value="full" data-i="of">전체 경로</option><option value="tail" data-i="ot">꼬리만</option><option value="none" data-i="on2">마커만</option></select>
    </div>
    <div class="cr" id="tailRow" style="display:none">
      <label><span data-i="tl">꼬리 길이</span><span id="tlV">100</span></label>
      <input type="range" id="tailLen" min="10" max="500" value="100">
    </div>
  </div>

  <!-- STATS TOGGLES -->
  <div class="sec">
    <div class="stit" data-i="sec_st">통계 오버레이 항목</div>
    <div class="stg" id="stToggles"></div>
  </div>

  <!-- ANIMATION -->
  <div class="sec">
    <div class="stit" data-i="sec_anim">애니메이션</div>
    <div class="cr"><label><span data-i="sp">속도</span><span id="spV">50 pt/f</span></label><input type="range" id="speed" min="1" max="200" value="50"></div>
    <div class="cr"><label><span>FPS</span><span id="fpsV">30</span></label><input type="range" id="fps" min="15" max="60" value="30" step="5"></div>
    <div class="cr"><label><span data-i="fm">팔로우 모드</span></label>
      <select id="followMode"><option value="follow" data-i="ofw">마커 따라가기</option><option value="fit" data-i="oft">전체 경로 고정</option></select>
    </div>
    <div class="cr"><label><span data-i="sd">시작 대기</span><span id="sdV">1.0s</span></label><input type="range" id="startDelay" min="0" max="5" value="1" step="0.5"></div>
    <div class="cr"><label><span data-i="ed">종료 대기</span><span id="edV">2.0s</span></label><input type="range" id="endDelay" min="0" max="10" value="2" step="0.5"></div>
  </div>

  <!-- VIDEO -->
  <div class="sec">
    <div class="stit" data-i="sec_vid">영상 출력</div>
    <div class="cr"><label><span data-i="res">해상도</span></label>
      <select id="resPreset">
        <option value="1280x720">1280 × 720 (HD)</option>
        <option value="1920x1080" selected>1920 × 1080 (FHD)</option>
        <option value="2560x1440">2560 × 1440 (QHD)</option>
        <option value="3840x2160">3840 × 2160 (4K)</option>
        <option value="custom" data-i="ocu">직접 입력</option>
      </select>
    </div>
    <div class="two-col" id="cusRes" style="display:none">
      <div class="cr"><label><span data-i="rw">너비</span></label><input type="number" id="cusW" value="1920" min="320" max="7680"></div>
      <div class="cr"><label><span data-i="rh">높이</span></label><input type="number" id="cusH" value="1080" min="240" max="4320"></div>
    </div>
    <div class="cr"><label><span data-i="br">비트레이트</span><span id="brV">8 Mbps</span></label><input type="range" id="bitrate" min="2" max="40" value="8"></div>
  </div>

  <!-- RUN -->
  <div class="sec">
    <div class="stit" data-i="sec_run">실행</div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <button class="btn bo" id="previewBtn" disabled onclick="startPreview()">▶ <span data-i="bprev">미리보기</span></button>
      <button class="btn bp" id="recordBtn" disabled onclick="startRecording()">⏺ <span data-i="brec">녹화 시작</span></button>
      <button class="btn bs" id="stopBtn" disabled onclick="stopRecording()">⏹ <span data-i="bstp">녹화 중지 &amp; 저장</span></button>
    </div>
    <div id="pgW"><div id="pgB"><div id="pgF"></div></div><div id="pgL"></div></div>
    <div id="recNote" style="display:none;margin-top:8px;font-size:.6rem;color:var(--ink2);line-height:1.5;padding:6px 8px;background:#fff8e6;border:1px solid #e6d49a;border-radius:4px" data-i="recNote">
      녹화 중 별도 캔버스에 지도를 직접 렌더링합니다. 타일 로딩에 따라 품질이 달라질 수 있습니다.
    </div>
  </div>
</aside>

<div id="mapWrap">
  <div id="map"></div>
  <canvas id="recCvs"></canvas>
  <button id="fbt" onclick="toggleSB()">☰</button>
  <div id="recB">● REC</div>
  <div id="stOvl"></div>
</div>
<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════
// I18N

function loadGPX(file){
  const r=new FileReader();
  r.onload=ev=>{
    try{
      gpxPoints=parseGPX(ev.target.result);
      if(!gpxPoints.length)throw new Error('No trackpoints');
      gpxTotalDist=calcDist(gpxPoints);
      gpxHasTime=gpxPoints.some(p=>p.time);
      if(!gpxHasTime) toast(t('notime'));
      showInfo(file.name);
      fitMap(); drawGhost(); enableBtns();
      toast('✓ '+gpxPoints.length.toLocaleString()+t('tl2'));
    }catch(e){toast('⚠ GPX error: '+e.message)}
  };
  r.readAsText(file);
}
function parseGPX(xml){
  const doc=new DOMParser().parseFromString(xml,'text/xml');
  return [...doc.querySelectorAll('trkpt,wpt,rtept')].map(pt=>{
    const lat=parseFloat(pt.getAttribute('lat')),lon=parseFloat(pt.getAttribute('lon'));
    if(isNaN(lat)||isNaN(lon))return null;
    const ele=pt.querySelector('ele'),time=pt.querySelector('time');
    return{lat,lon,ele:ele?parseFloat(ele.textContent):null,time:time?new Date(time.textContent):null};
  }).filter(Boolean);
}

// ════════════════════════════════════════════════════
// MATH HELPERS
// ════════════════════════════════════════════════════
function calcDist(pts){let d=0;for(let i=1;i<pts.length;i++)d+=hav(pts[i-1],pts[i]);return d}
function hav(a,b){
  const R=6371000,dl=(b.lat-a.lat)*Math.PI/180,dL=(b.lon-a.lon)*Math.PI/180;
  const x=Math.sin(dl/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dL/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function bearing(a,b){
  const dL=(b.lon-a.lon)*Math.PI/180,la=a.lat*Math.PI/180,lb=b.lat*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(lb),x=Math.cos(la)*Math.sin(lb)-Math.sin(la)*Math.cos(lb)*Math.cos(dL);
  const deg=(Math.atan2(y,x)*180/Math.PI+360)%360;
  return Math.round(deg)+'° '+['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
}
function fmtMs(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
  return h?`${h}h ${m}m ${ss}s`:`${m}m ${ss}s`;
}

// ════════════════════════════════════════════════════
// STATS — using GPX timestamps when available
// ════════════════════════════════════════════════════
function updateStats(pts,idx,animElapsedMs){
  if(!SDEFS.some(d=>stOn[d.id]))return;
  const cur=pts[pts.length-1];
  const distSoFar=calcDist(pts);
  const eles=pts.map(p=>p.ele).filter(e=>e!==null);
  const pct=gpxPoints.length>0?idx/gpxPoints.length*100:0;
  const remain=gpxTotalDist-distSoFar;

  // elevation gain
  let again=0;
  for(let i=1;i<eles.length;i++)if(eles[i]>eles[i-1])again+=eles[i]-eles[i-1];

  // ── SPEED: use GPX timestamps if available, else animation timing ──
  let spdKmh=0;
  if(pts.length>=2){
    const prev=pts[pts.length-2],d=hav(prev,cur);
    if(gpxHasTime&&cur.time&&prev.time){
      const dtS=(cur.time-prev.time)/1000;
      spdKmh=dtS>0?(d/dtS)*3.6:0;
    } else {
      // fallback: use animation frame interval
      const s=getS();
      spdKmh=(d/(1000/s.fps/1000))*3.6;
    }
  }
  if(spdKmh>maxSpd)maxSpd=spdKmh;

  // ── GPS ELAPSED TIME: first to last point with timestamp ──
  let gpxElapsedMs=0;
  if(gpxHasTime&&pts.length>=2){
    const t0=pts.find(p=>p.time);
    const tN=[...pts].reverse().find(p=>p.time);
    if(t0&&tN)gpxElapsedMs=tN.time-t0.time;
  }

  // ── AVG SPEED: based on GPS elapsed time if available ──
  let aspdKmh=0;
  if(gpxHasTime&&gpxElapsedMs>0){
    aspdKmh=(distSoFar/(gpxElapsedMs/3600000));
  } else if(animElapsedMs>0){
    aspdKmh=(distSoFar/(animElapsedMs/3600000));
  }

  const set=(id,v)=>{const el=document.getElementById('sv_'+id);if(el)el.textContent=v};
  if(stOn.dist)  set('dist',(distSoFar/1000).toFixed(2)+' km');
  if(stOn.pct)   set('pct',pct.toFixed(1)+'%');
  if(stOn.pt)    set('pt',idx+' / '+gpxPoints.length);
  if(stOn.spd)   set('spd',spdKmh.toFixed(1)+' km/h');
  if(stOn.aspd)  set('aspd',aspdKmh.toFixed(1)+' km/h');
  if(stOn.mspd)  set('mspd',maxSpd.toFixed(1)+' km/h');
  if(stOn.gtime) set('gtime',gpxHasTime?fmtMs(gpxElapsedMs):'—');
  if(stOn.time)  set('time',fmtMs(animElapsedMs));
  if(stOn.rem)   set('rem',(remain/1000).toFixed(2)+' km');
  if(stOn.alt)   set('alt',eles.length?Math.round(eles[eles.length-1])+' m':'—');
  if(stOn.amax)  set('amax',eles.length?Math.round(Math.max(...eles))+' m':'—');
  if(stOn.amin)  set('amin',eles.length?Math.round(Math.min(...eles))+' m':'—');
  if(stOn.again) set('again',Math.round(again)+' m');
  if(stOn.lat)   set('lat',cur.lat.toFixed(5)+'°');
  if(stOn.lon)   set('lon',cur.lon.toFixed(5)+'°');
  if(stOn.bear)  set('bear',pts.length>=2?bearing(pts[pts.length-2],cur):'—');
}

// ANIMATION (preview on Leaflet map)

function clearLayers(){
  if(animPolyline){map.removeLayer(animPolyline);animPolyline=null}
  if(animMarker){map.removeLayer(animMarker);animMarker=null}
}
function startPreview(){
  if(!gpxPoints.length)return;
  stopAnim();clearLayers();
  animIndex=0;animPoints=[];maxSpd=0;animStartTs=null;
  const s=getS();
  if(drawnPolyline)map.removeLayer(drawnPolyline);
  drawnPolyline=L.polyline(gpxPoints.map(p=>[p.lat,p.lon]),
    {color:'#ddd',weight:s.lineWeight,opacity:.4,dashArray:da(s.lineDash,s.lineWeight)}).addTo(map);
  if(s.followMode==='fit')fitMap();
  rebuildOverlay();
  const anyOn=SDEFS.some(d=>stOn[d.id]);
  document.getElementById('stOvl').style.display=anyOn&&animPoints.length?'block':'none';
  setTimeout(()=>runAnim(s,false),s.startDelay*1000);
}
function runAnim(s,recording){
  const interval=1000/s.fps; let lastT=0;
  function frame(ts){
    if(!animStartTs)animStartTs=ts;
    if(ts-lastT<interval){animFrame=requestAnimationFrame(frame);return}
    lastT=ts;
    const step=Math.min(s.speed,gpxPoints.length-animIndex);
    for(let i=0;i<step&&animIndex<gpxPoints.length;i++)animPoints.push(gpxPoints[animIndex++]);
    // polyline
    if(animPolyline)map.removeLayer(animPolyline);
    let dPts=animPoints;
    if(s.showTrail==='tail')dPts=animPoints.slice(-s.tailLen);
    if(s.showTrail==='none')dPts=[];
    if(dPts.length>1)animPolyline=L.polyline(dPts.map(p=>[p.lat,p.lon]),
      {color:s.lineColor,weight:s.lineWeight,opacity:s.lineOpacity,
       dashArray:da(s.lineDash,s.lineWeight),lineCap:'round',lineJoin:'round'}).addTo(map);
    // marker
    const cur=animPoints[animPoints.length-1];
    if(animMarker)map.removeLayer(animMarker);
    animMarker=L.marker([cur.lat,cur.lon],{icon:mkIcon(s.markerType,s.markerSize,s.markerColor),zIndexOffset:1000}).addTo(map);
    if(s.followMode==='follow')map.setView([cur.lat,cur.lon],map.getZoom(),{animate:true,duration:.3});
    // stats
    const anyOn=SDEFS.some(d=>stOn[d.id]);
    document.getElementById('stOvl').style.display=anyOn?'block':'none';
    if(anyOn)updateStats(animPoints,animIndex,ts-animStartTs);
    if(animIndex<gpxPoints.length){animFrame=requestAnimationFrame(frame);}
    else{setTimeout(()=>{if(recording)stopRecording();},s.endDelay*1000);}
  }
  animFrame=requestAnimationFrame(frame);
}
function stopAnim(){if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}}

// ════════════════════════════════════════════════════
// RECORDING — composited canvas approach
// We draw: 1) map tiles (fetched as images) 2) route 3) marker 4) stats text
// onto an offscreen canvas, then captureStream from that canvas.
// ════════════════════════════════════════════════════
let recCvs=null, recCtx=null, recStream=null;
let tileCache={};   // url -> HTMLImageElement (loaded)
const TILE_SIZE=256;

// Convert lat/lon to tile coordinates at a given zoom
function latLonToTile(lat,lon,zoom){
  const n=Math.pow(2,zoom);
  const x=(lon+180)/360*n;
  const latRad=lat*Math.PI/180;
  const y=(1-Math.log(Math.tan(latRad)+1/Math.cos(latRad))/Math.PI)/2*n;
  return{x,y};
}
// Convert tile coords to lat/lon (top-left corner of tile)
function tileToLatLon(tx,ty,zoom){
  const n=Math.pow(2,zoom);
  const lon=tx/n*360-180;
  const latRad=Math.atan(Math.sinh(Math.PI*(1-2*ty/n)));
  return{lat:latRad*180/Math.PI,lon};
}

// Project a lat/lon to canvas pixel given map bounds
function project(lat,lon,bounds,cw,ch){
  const minLat=bounds.getSouth(),maxLat=bounds.getNorth();
  const minLon=bounds.getWest(),maxLon=bounds.getEast();
  const x=(lon-minLon)/(maxLon-minLon)*cw;
  const y=(maxLat-lat)/(maxLat-minLat)*ch;
  return{x,y};
}

async function loadTile(url){
  if(tileCache[url])return tileCache[url];
  return new Promise(resolve=>{
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{tileCache[url]=img;resolve(img)};
    img.onerror=()=>resolve(null);
    img.src=url;
  });
}

async function drawTilesOnCanvas(ctx,cw,ch,bounds,zoom){
  const subdomains=['a','b','c','d'];
  // get tile range
  const nw=latLonToTile(bounds.getNorth(),bounds.getWest(),zoom);
  const se=latLonToTile(bounds.getSouth(),bounds.getEast(),zoom);
  const txMin=Math.floor(nw.x), txMax=Math.floor(se.x);
  const tyMin=Math.floor(nw.y), tyMax=Math.floor(se.y);

  const promises=[];
  for(let ty=tyMin;ty<=tyMax;ty++){
    for(let tx=txMin;tx<=txMax;tx++){
      const sd=subdomains[(tx+ty)%subdomains.length];
      const url=`https://${sd}.basemaps.cartocdn.com/rastertiles/voyager/${zoom}/${tx}/${ty}.png`;
      // compute pixel position of this tile's top-left on canvas
      const tileTopLeft=tileToLatLon(tx,ty,zoom);
      const tileBottomRight=tileToLatLon(tx+1,ty+1,zoom);
      const p1=project(tileTopLeft.lat,tileTopLeft.lon,bounds,cw,ch);
      const p2=project(tileBottomRight.lat,tileBottomRight.lon,bounds,cw,ch);
      const tw=p2.x-p1.x, th=p2.y-p1.y;
      promises.push(loadTile(url).then(img=>{
        if(img)ctx.drawImage(img,p1.x,p1.y,tw,th);
      }));
    }
  }
  await Promise.all(promises);
}

function drawRouteOnCanvas(ctx,pts,s,bounds,cw,ch){
  if(pts.length<2)return;
  ctx.save();
  ctx.strokeStyle=s.lineColor;
  ctx.lineWidth=s.lineWeight;
  ctx.globalAlpha=s.lineOpacity;
  ctx.lineCap='round';ctx.lineJoin='round';
  if(s.lineDash==='dashed')ctx.setLineDash([s.lineWeight*4,s.lineWeight*2]);
  else if(s.lineDash==='dotted')ctx.setLineDash([1,s.lineWeight*2]);
  else ctx.setLineDash([]);
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const{x,y}=project(p.lat,p.lon,bounds,cw,ch);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  ctx.restore();
}

function drawMarkerOnCanvas(ctx,pt,s,bounds,cw,ch){
  const{x,y}=project(pt.lat,pt.lon,bounds,cw,ch);
  const sz=s.markerSize;
  const r=sz/2+3;
  ctx.save();
  // circle bg
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fillStyle=s.markerColor+'33';
  ctx.fill();
  // border
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
  ctx.strokeStyle=s.markerColor;ctx.lineWidth=2.5;
  ctx.stroke();
  // emoji
  ctx.font=`${Math.round(sz*.72)}px serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(MKE[s.markerType]||'🚶',x,y);
  ctx.restore();
}

function drawGhostOnCanvas(ctx,bounds,cw,ch){
  if(!gpxPoints.length)return;
  ctx.save();
  ctx.strokeStyle='#cccccc';ctx.lineWidth=2;ctx.globalAlpha=.4;ctx.setLineDash([]);
  ctx.beginPath();
  gpxPoints.forEach((p,i)=>{
    const{x,y}=project(p.lat,p.lon,bounds,cw,ch);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();ctx.restore();
}

function drawStatsOnCanvas(ctx,pts,idx,animElapsed,cw,ch){
  if(!SDEFS.some(d=>stOn[d.id]))return;
  // same calculation as updateStats
  const cur=pts[pts.length-1];
  const distSoFar=calcDist(pts);
  const eles=pts.map(p=>p.ele).filter(e=>e!==null);
  const pct=gpxPoints.length>0?idx/gpxPoints.length*100:0;
  const remain=gpxTotalDist-distSoFar;
  let again=0;for(let i=1;i<eles.length;i++)if(eles[i]>eles[i-1])again+=eles[i]-eles[i-1];
  let spdKmh=0;
  if(pts.length>=2){
    const prev=pts[pts.length-2],d=hav(prev,cur);
    if(gpxHasTime&&cur.time&&prev.time){const dt=(cur.time-prev.time)/1000;spdKmh=dt>0?(d/dt)*3.6:0;}
    else{const s=getS();spdKmh=(d/(1000/s.fps/1000))*3.6;}
  }
  let gpxElapsedMs=0;
  if(gpxHasTime&&pts.length>=2){
    const t0=pts.find(p=>p.time),tN=[...pts].reverse().find(p=>p.time);
    if(t0&&tN)gpxElapsedMs=tN.time-t0.time;
  }
  const s2=getS();
  let aspdKmh=gpxHasTime&&gpxElapsedMs>0?(distSoFar/(gpxElapsedMs/3600000)):
    animElapsed>0?(distSoFar/(animElapsed/3600000)):0;

  const vals={
    dist:(distSoFar/1000).toFixed(2)+' km',pct:pct.toFixed(1)+'%',
    pt:idx+' / '+gpxPoints.length,
    spd:spdKmh.toFixed(1)+' km/h',aspd:aspdKmh.toFixed(1)+' km/h',mspd:maxSpd.toFixed(1)+' km/h',
    gtime:gpxHasTime?fmtMs(gpxElapsedMs):'—',time:fmtMs(animElapsed),
    rem:(remain/1000).toFixed(2)+' km',
    alt:eles.length?Math.round(eles[eles.length-1])+' m':'—',
    amax:eles.length?Math.round(Math.max(...eles))+' m':'—',
    amin:eles.length?Math.round(Math.min(...eles))+' m':'—',
    again:Math.round(again)+' m',
    lat:cur.lat.toFixed(5)+'°',lon:cur.lon.toFixed(5)+'°',
    bear:pts.length>=2?bearing(pts[pts.length-2],cur):'—'
  };

  const active=SDEFS.filter(d=>stOn[d.id]);
  if(!active.length)return;

  const lineH=22, pad=14, labelW=100;
  const boxW=240, boxH=active.length*lineH+pad*2;
  const bx=14,by=ch-boxH-28;

  ctx.save();
  // box
  ctx.fillStyle='rgba(12,10,8,.88)';
  roundRect(ctx,bx,by,boxW,boxH,10);ctx.fill();
  // text
  ctx.font='bold 11px monospace';
  active.forEach((d,i)=>{
    const y=by+pad+(i+.72)*lineH;
    ctx.fillStyle='#888';
    ctx.textAlign='left';
    ctx.fillText(d.icon+' '+t(d.key),bx+10,y);
    ctx.fillStyle='#fff';
    ctx.textAlign='right';
    ctx.fillText(vals[d.id]||'—',bx+boxW-10,y);
  });
  ctx.restore();
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function getRecZoom(){
  // Use a zoom level slightly lower than current for tile coverage comfort
  return Math.min(map.getZoom(),16);
}

async function renderRecFrame(s,bounds,cw,ch,pts,idx,animElapsed){
  const zoom=getRecZoom();
  recCtx.clearRect(0,0,cw,ch);
  // 1. tiles
  await drawTilesOnCanvas(recCtx,cw,ch,bounds,zoom);
  // 2. ghost
  drawGhostOnCanvas(recCtx,bounds,cw,ch);
  // 3. route
  let dPts=pts;
  if(s.showTrail==='tail')dPts=pts.slice(-s.tailLen);
  if(s.showTrail==='none')dPts=[];
  drawRouteOnCanvas(recCtx,dPts,s,bounds,cw,ch);
  // 4. marker
  if(pts.length)drawMarkerOnCanvas(recCtx,pts[pts.length-1],s,bounds,cw,ch);
  // 5. stats
  drawStatsOnCanvas(recCtx,pts,idx,animElapsed,cw,ch);
}

function startRecording(){
  if(!gpxPoints.length)return;
  stopAnim();clearLayers();
  const s=getS();
  if(!window.MediaRecorder){toast('⚠ MediaRecorder not supported');return;}

  // Setup recording canvas
  recCvs=document.getElementById('recCvs');
  recCvs.width=s.w; recCvs.height=s.h;
  recCvs.style.display='block';
  recCtx=recCvs.getContext('2d');

  // Determine map bounds for projection
  // Use current map bounds, or fit to GPX
  let bounds;
  if(s.followMode==='fit'){
    bounds=L.latLngBounds(gpxPoints.map(p=>[p.lat,p.lon])).pad(0.05);
  } else {
    // start with full bounds; will update per-frame in follow mode
    bounds=L.latLngBounds(gpxPoints.map(p=>[p.lat,p.lon])).pad(0.05);
  }

  const mimes=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  const mimeType=mimes.find(m=>MediaRecorder.isTypeSupported(m))||'';
  if(!mimeType){toast('⚠ No supported video format');return;}

  recordedChunks=[];
  let stream;
  try{stream=recCvs.captureStream(s.fps);}
  catch(e){toast('⚠ captureStream failed: '+e.message);return;}
  try{mediaRecorder=new MediaRecorder(stream,{mimeType,videoBitsPerSecond:s.bitrate*1_000_000});}
  catch(e){toast('⚠ MediaRecorder init failed');return;}

  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data)};
  mediaRecorder.onstop=saveVideo;
  mediaRecorder.start(100);
  isRecording=true;

  document.getElementById('recB').style.display='block';
  document.getElementById('recordBtn').disabled=true;
  document.getElementById('stopBtn').disabled=false;
  document.getElementById('pgW').style.display='block';
  document.getElementById('recNote').style.display='block';
  document.getElementById('pgL').textContent=t('prec');

  // Hide the regular stats overlay (we draw it on canvas)
  document.getElementById('stOvl').style.display='none';

  animIndex=0; animPoints=[]; maxSpd=0; animStartTs=null;
  tileCache={};  // clear tile cache for fresh load

  const pi=setInterval(()=>{
    const pct=gpxPoints.length?animIndex/gpxPoints.length*100:0;
    document.getElementById('pgF').style.width=pct+'%';
    document.getElementById('pgL').textContent=`${t('prec')} ${pct.toFixed(0)}% (${animIndex}/${gpxPoints.length})`;
    if(animIndex>=gpxPoints.length)clearInterval(pi);
  },200);

  toast('⏺ '+t('trec'));
  setTimeout(()=>runRecAnim(s,bounds),s.startDelay*1000);
}

function runRecAnim(s,initialBounds){
  let bounds=initialBounds;
  const cw=recCvs.width, ch=recCvs.height;
  const interval=1000/s.fps; let lastT=0;

  async function frame(ts){
    if(!animStartTs)animStartTs=ts;
    if(ts-lastT<interval){animFrame=requestAnimationFrame(frame);return}
    lastT=ts;
    const animElapsed=ts-animStartTs;

    const step=Math.min(s.speed,gpxPoints.length-animIndex);
    for(let i=0;i<step&&animIndex<gpxPoints.length;i++)animPoints.push(gpxPoints[animIndex++]);

    // update bounds in follow mode
    if(s.followMode==='follow'&&animPoints.length){
      const cur=animPoints[animPoints.length-1];
      // Create a view-sized bounding box around current position
      // Use map's current zoom to estimate degree span
      const spanLat=0.02, spanLon=0.03;
      bounds=L.latLngBounds(
        [cur.lat-spanLat,cur.lon-spanLon],
        [cur.lat+spanLat,cur.lon+spanLon]
      );
    }

    if(spdKmhForCanvas!==undefined&&animPoints.length>0){
      const cur2=animPoints[animPoints.length-1];
      if(animPoints.length>=2){
        const prev2=animPoints[animPoints.length-2],d2=hav(prev2,cur2);
        if(gpxHasTime&&cur2.time&&prev2.time){const dt=(cur2.time-prev2.time)/1000;spdKmhForCanvas=dt>0?(d2/dt)*3.6:0;}
        else{spdKmhForCanvas=(d2/(1000/s.fps/1000))*3.6;}
        if(spdKmhForCanvas>maxSpd)maxSpd=spdKmhForCanvas;
      }
    }

    await renderRecFrame(s,bounds,cw,ch,animPoints,animIndex,animElapsed);

    if(animIndex<gpxPoints.length){animFrame=requestAnimationFrame(frame);}
    else{setTimeout(()=>stopRecording(),s.endDelay*1000);}
  }
  let spdKmhForCanvas=0;
  animFrame=requestAnimationFrame(frame);
}

function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();
  stopAnim(); isRecording=false;
  document.getElementById('recB').style.display='none';
  document.getElementById('recCvs').style.display='none';
  document.getElementById('stopBtn').disabled=true;
  document.getElementById('recordBtn').disabled=false;
  document.getElementById('pgL').textContent=t('psave');
  // restore stats overlay
  const anyOn=SDEFS.some(d=>stOn[d.id]);
  if(animPoints.length&&anyOn)document.getElementById('stOvl').style.display='block';
}
function saveVideo(){
  if(!recordedChunks.length){toast('⚠ No data to save');return;}
  const mimeType=recordedChunks[0].type||'video/webm';
  const blob=new Blob(recordedChunks,{type:mimeType});
  const ext=mimeType.includes('mp4')?'mp4':'webm';
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='gpx-animation-'+Date.now()+'.'+ext;
  a.click();URL.revokeObjectURL(url);
  document.getElementById('pgF').style.width='100%';
  document.getElementById('pgL').textContent=`✓ ${t('pdone')} (${(blob.size/1024/1024).toFixed(1)} MB)`;
  toast('✓ '+t('tsaved'));
}

// ════════════════════════════════════════════════════
// UTILS
// ════════════════════════════════════════════════════
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3200);
}
window.addEventListener('resize',()=>map.invalidateSize());
setTimeout(()=>map.invalidateSize(),100);

// INIT
buildToggles();
rebuildOverlay();
applyI18n();
</script>

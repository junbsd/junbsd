<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPX Animator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f2ed;
    --panel: #faf8f5;
    --border: #ddd8d0;
    --ink: #1a1814;
    --ink2: #6b6560;
    --accent: #c84b2f;
    --accent2: #2f6ec8;
    --mono: 'DM Mono', monospace;
    --serif: 'Fraunces', serif;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--ink);
    height: 100vh;
    display: grid;
    grid-template-columns: 320px 1fr;
    grid-template-rows: 56px 1fr;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    grid-column: 1 / -1;
    background: var(--ink);
    color: var(--bg);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    border-bottom: 2px solid var(--accent);
  }
  header h1 {
    font-family: var(--serif);
    font-weight: 600;
    font-size: 1.15rem;
    letter-spacing: -0.01em;
  }
  header span {
    font-size: 0.7rem;
    color: #888;
    margin-left: auto;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    background: var(--panel);
    border-right: 1.5px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .section {
    border-bottom: 1.5px solid var(--border);
    padding: 16px;
  }
  .section-title {
    font-size: 0.62rem;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
  }

  /* DROP ZONE */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: transparent;
  }
  #dropzone:hover, #dropzone.over {
    border-color: var(--accent);
    background: #fdf0ec;
  }
  #dropzone .icon { font-size: 2rem; margin-bottom: 8px; }
  #dropzone p { font-size: 0.75rem; color: var(--ink2); line-height: 1.5; }
  #dropzone strong { color: var(--ink); }
  #fileInput { display: none; }

  #fileInfo {
    display: none;
    margin-top: 10px;
    background: #eef6ee;
    border: 1px solid #b8dab8;
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 0.7rem;
    color: #2d6b2d;
  }

  /* CONTROLS */
  .ctrl-row {
    display: flex;
    flex-direction: column;
    gap: 3px;
    margin-bottom: 10px;
  }
  .ctrl-row:last-child { margin-bottom: 0; }
  .ctrl-row label {
    font-size: 0.68rem;
    color: var(--ink2);
    display: flex;
    justify-content: space-between;
  }
  .ctrl-row label span {
    color: var(--ink);
    font-weight: 500;
  }

  input[type=range] {
    width: 100%;
    height: 4px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  input[type=color] {
    width: 100%;
    height: 32px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    padding: 2px;
    background: white;
  }
  select, input[type=number], input[type=text] {
    width: 100%;
    height: 30px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    padding: 0 8px;
    font-family: var(--mono);
    font-size: 0.72rem;
    background: white;
    color: var(--ink);
    outline: none;
  }
  select:focus, input:focus {
    border-color: var(--accent2);
  }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  /* BUTTONS */
  .btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.04em;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-secondary {
    background: var(--ink);
    color: var(--bg);
  }
  .btn-outline {
    background: transparent;
    color: var(--ink);
    border: 1.5px solid var(--border);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* PROGRESS */
  #progressWrap {
    display: none;
    margin-top: 10px;
  }
  #progressBar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  #progressFill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s;
  }
  #progressLabel {
    font-size: 0.65rem;
    color: var(--ink2);
    text-align: center;
  }

  /* ── MAP AREA ── */
  #mapWrap {
    position: relative;
    overflow: hidden;
    background: #e8e4de;
  }
  #map {
    width: 100%;
    height: 100%;
  }

  /* Recording indicator */
  #recIndicator {
    display: none;
    position: absolute;
    top: 14px;
    right: 14px;
    background: var(--accent);
    color: white;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 20px;
    z-index: 1000;
    letter-spacing: 0.08em;
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* Stats overlay */
  #statsOverlay {
    display: none;
    position: absolute;
    bottom: 24px;
    left: 14px;
    background: rgba(26,24,20,0.82);
    color: #f5f2ed;
    font-size: 0.68rem;
    padding: 10px 14px;
    border-radius: 6px;
    z-index: 1000;
    line-height: 1.8;
    backdrop-filter: blur(4px);
  }
  #statsOverlay .stat-label { color: #aaa; font-size: 0.6rem; }

  /* toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--ink);
    color: var(--bg);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 0.72rem;
    z-index: 9999;
    transition: transform 0.3s;
    pointer-events: none;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  .tag {
    display: inline-block;
    font-size: 0.6rem;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--border);
    color: var(--ink2);
    margin-left: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>GPX Animator</h1>
  <span>맥북 전용 · GPX → 지도 애니메이션 영상</span>
</header>

<!-- SIDEBAR -->
<aside id="sidebar">

  <!-- FILE UPLOAD -->
  <div class="section">
    <div class="section-title">GPX 파일</div>
    <div id="dropzone" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🗺</div>
      <p><strong>클릭하거나 파일을 드래그</strong><br>.gpx 파일을 업로드하세요</p>
    </div>
    <input type="file" id="fileInput" accept=".gpx">
    <div id="fileInfo"></div>
  </div>

  <!-- LINE STYLE -->
  <div class="section">
    <div class="section-title">선 스타일</div>

    <div class="ctrl-row">
      <label>선 색상</label>
      <input type="color" id="lineColor" value="#e63946">
    </div>
    <div class="ctrl-row">
      <label>선 두께 <span id="lineWeightVal">4px</span></label>
      <input type="range" id="lineWeight" min="1" max="12" value="4" step="0.5">
    </div>
    <div class="ctrl-row">
      <label>선 투명도 <span id="lineOpacityVal">90%</span></label>
      <input type="range" id="lineOpacity" min="10" max="100" value="90">
    </div>
    <div class="ctrl-row">
      <label>선 스타일</label>
      <select id="lineDash">
        <option value="solid">실선 (Solid)</option>
        <option value="dashed">점선 (Dashed)</option>
        <option value="dotted">점 (Dotted)</option>
      </select>
    </div>

    <div class="ctrl-row" style="margin-top:12px;">
      <label>마커 색상</label>
      <input type="color" id="markerColor" value="#e63946">
    </div>
    <div class="ctrl-row">
      <label>마커 크기 <span id="markerSizeVal">14px</span></label>
      <input type="range" id="markerSize" min="6" max="30" value="14">
    </div>
    <div class="ctrl-row">
      <label>마커 꼬리 표시</label>
      <select id="showTrail">
        <option value="full">전체 경로 표시</option>
        <option value="tail">꼬리만 표시 (최근 N개)</option>
        <option value="none">마커만 표시</option>
      </select>
    </div>
    <div class="ctrl-row" id="tailLenRow" style="display:none;">
      <label>꼬리 길이 <span id="tailLenVal">100</span>포인트</label>
      <input type="range" id="tailLen" min="10" max="500" value="100">
    </div>
  </div>

  <!-- ANIMATION -->
  <div class="section">
    <div class="section-title">애니메이션</div>

    <div class="ctrl-row">
      <label>애니메이션 속도 <span id="speedVal">50</span>pt/frame</label>
      <input type="range" id="speed" min="1" max="200" value="50">
    </div>
    <div class="ctrl-row">
      <label>FPS <span id="fpsVal">30</span></label>
      <input type="range" id="fps" min="15" max="60" value="30" step="5">
    </div>
    <div class="ctrl-row">
      <label>지도 팔로우 모드</label>
      <select id="followMode">
        <option value="follow">마커 따라가기</option>
        <option value="fit">전체 경로 고정</option>
      </select>
    </div>
    <div class="ctrl-row">
      <label>시작 대기 (초) <span id="startDelayVal">1.0s</span></label>
      <input type="range" id="startDelay" min="0" max="5" value="1" step="0.5">
    </div>
    <div class="ctrl-row">
      <label>종료 대기 (초) <span id="endDelayVal">2.0s</span></label>
      <input type="range" id="endDelay" min="0" max="10" value="2" step="0.5">
    </div>
  </div>

  <!-- VIDEO OUTPUT -->
  <div class="section">
    <div class="section-title">영상 출력</div>

    <div class="ctrl-row">
      <label>해상도 프리셋</label>
      <select id="resPreset">
        <option value="1280x720">1280 × 720 (HD)</option>
        <option value="1920x1080" selected>1920 × 1080 (FHD)</option>
        <option value="2560x1440">2560 × 1440 (QHD)</option>
        <option value="3840x2160">3840 × 2160 (4K)</option>
        <option value="custom">직접 입력</option>
      </select>
    </div>
    <div class="two-col" id="customResRow" style="display:none;">
      <div class="ctrl-row">
        <label>너비</label>
        <input type="number" id="customW" value="1920" min="320" max="7680">
      </div>
      <div class="ctrl-row">
        <label>높이</label>
        <input type="number" id="customH" value="1080" min="240" max="4320">
      </div>
    </div>
    <div class="ctrl-row">
      <label>비트레이트 (Mbps) <span id="bitrateVal">8</span></label>
      <input type="range" id="bitrate" min="2" max="40" value="8">
    </div>
    <div class="ctrl-row">
      <label>통계 오버레이 표시</label>
      <select id="showStats">
        <option value="yes">표시</option>
        <option value="no">숨김</option>
      </select>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="section">
    <div class="section-title">실행</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <button class="btn btn-outline" id="previewBtn" disabled onclick="startPreview()">▶ 미리보기</button>
      <button class="btn btn-primary" id="recordBtn" disabled onclick="startRecording()">⏺ 녹화 시작</button>
      <button class="btn btn-secondary" id="stopBtn" disabled onclick="stopRecording()">⏹ 녹화 중지 &amp; 저장</button>
    </div>
    <div id="progressWrap">
      <div id="progressBar"><div id="progressFill"></div></div>
      <div id="progressLabel">준비 중...</div>
    </div>
  </div>

</aside>

<!-- MAP -->
<div id="mapWrap">
  <div id="map"></div>
  <div id="recIndicator">● REC</div>
  <div id="statsOverlay">
    <div><span class="stat-label">거리</span> <span id="statDist">—</span></div>
    <div><span class="stat-label">포인트</span> <span id="statPt">—</span></div>
    <div><span class="stat-label">고도</span> <span id="statAlt">—</span></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
let gpxPoints = [];
let map, drawnPolyline, markerCircle, markerOutline;
let animFrame = null;
let animIndex = 0;
let isRecording = false;
let mediaRecorder = null;
let recordedChunks = [];
let offscreenCanvas, offscreenCtx;
let offscreenMap, offscreenLeaflet;

// ── MAP INIT ───────────────────────────────────────────────────────────────
map = L.map('map', { zoomControl: true, attributionControl: true });

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

map.setView([37.5665, 126.9780], 13);

// ── RANGE LABELS ───────────────────────────────────────────────────────────
const bindings = [
  ['lineWeight', 'lineWeightVal', v => v + 'px'],
  ['lineOpacity', 'lineOpacityVal', v => v + '%'],
  ['markerSize', 'markerSizeVal', v => v + 'px'],
  ['speed', 'speedVal', v => v + 'pt/frame'],
  ['fps', 'fpsVal', v => v],
  ['startDelay', 'startDelayVal', v => v + 's'],
  ['endDelay', 'endDelayVal', v => v + 's'],
  ['bitrate', 'bitrateVal', v => v],
  ['tailLen', 'tailLenVal', v => v],
];
bindings.forEach(([id, labelId, fmt]) => {
  const el = document.getElementById(id);
  const label = document.getElementById(labelId);
  el.addEventListener('input', () => { label.textContent = fmt(el.value); });
});

// trail mode toggle
document.getElementById('showTrail').addEventListener('change', e => {
  document.getElementById('tailLenRow').style.display = e.target.value === 'tail' ? 'flex' : 'none';
});

// resolution preset
document.getElementById('resPreset').addEventListener('change', e => {
  document.getElementById('customResRow').style.display = e.target.value === 'custom' ? 'grid' : 'none';
});

// ── FILE HANDLING ──────────────────────────────────────────────────────────
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('over');
  const file = e.dataTransfer.files[0];
  if (file) loadGPX(file);
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadGPX(e.target.files[0]);
});

function loadGPX(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      gpxPoints = parseGPX(e.target.result);
      if (!gpxPoints.length) throw new Error('포인트 없음');
      displayFileInfo(file.name, gpxPoints);
      fitMap();
      drawFullPath();
      enableButtons();
      toast('✓ ' + gpxPoints.length.toLocaleString() + '개 포인트 로드됨');
    } catch(err) {
      toast('⚠ GPX 파싱 실패: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function parseGPX(xml) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'text/xml');
  const pts = [];
  const trkpts = doc.querySelectorAll('trkpt, wpt, rtept');
  trkpts.forEach(pt => {
    const lat = parseFloat(pt.getAttribute('lat'));
    const lon = parseFloat(pt.getAttribute('lon'));
    const ele = pt.querySelector('ele');
    const time = pt.querySelector('time');
    if (!isNaN(lat) && !isNaN(lon)) {
      pts.push({
        lat, lon,
        ele: ele ? parseFloat(ele.textContent) : null,
        time: time ? new Date(time.textContent) : null
      });
    }
  });
  return pts;
}

function displayFileInfo(name, pts) {
  const info = document.getElementById('fileInfo');
  const totalDist = calcTotalDistance(pts);
  const eleArr = pts.map(p => p.ele).filter(e => e !== null);
  const eleInfo = eleArr.length ? `고도 ${Math.min(...eleArr).toFixed(0)}~${Math.max(...eleArr).toFixed(0)}m` : '';
  info.style.display = 'block';
  info.innerHTML = `📄 ${name}<br>📍 ${pts.length.toLocaleString()}pts · 📏 ${(totalDist/1000).toFixed(2)}km${eleInfo ? ' · ⛰ ' + eleInfo : ''}`;
}

function calcTotalDistance(pts) {
  let d = 0;
  for (let i = 1; i < pts.length; i++) d += haversine(pts[i-1], pts[i]);
  return d;
}

function haversine(a, b) {
  const R = 6371000;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLon = (b.lon - a.lon) * Math.PI / 180;
  const x = Math.sin(dLat/2) ** 2 + Math.cos(a.lat * Math.PI/180) * Math.cos(b.lat * Math.PI/180) * Math.sin(dLon/2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function fitMap() {
  const bounds = L.latLngBounds(gpxPoints.map(p => [p.lat, p.lon]));
  map.fitBounds(bounds, { padding: [40, 40] });
}

function drawFullPath() {
  if (drawnPolyline) map.removeLayer(drawnPolyline);
  drawnPolyline = L.polyline(gpxPoints.map(p => [p.lat, p.lon]), {
    color: '#ccc', weight: 2, opacity: 0.5
  }).addTo(map);
}

function enableButtons() {
  document.getElementById('previewBtn').disabled = false;
  document.getElementById('recordBtn').disabled = false;
}

// ── ANIMATION CORE ─────────────────────────────────────────────────────────
let animPolyline = null;
let animLayer = null;
let animPoints = [];

function getSettings() {
  const preset = document.getElementById('resPreset').value;
  let w, h;
  if (preset === 'custom') {
    w = parseInt(document.getElementById('customW').value);
    h = parseInt(document.getElementById('customH').value);
  } else {
    [w, h] = preset.split('x').map(Number);
  }
  return {
    lineColor: document.getElementById('lineColor').value,
    lineWeight: parseFloat(document.getElementById('lineWeight').value),
    lineOpacity: parseInt(document.getElementById('lineOpacity').value) / 100,
    lineDash: document.getElementById('lineDash').value,
    markerColor: document.getElementById('markerColor').value,
    markerSize: parseInt(document.getElementById('markerSize').value),
    showTrail: document.getElementById('showTrail').value,
    tailLen: parseInt(document.getElementById('tailLen').value),
    speed: parseInt(document.getElementById('speed').value),
    fps: parseInt(document.getElementById('fps').value),
    followMode: document.getElementById('followMode').value,
    startDelay: parseFloat(document.getElementById('startDelay').value),
    endDelay: parseFloat(document.getElementById('endDelay').value),
    bitrate: parseInt(document.getElementById('bitrate').value),
    showStats: document.getElementById('showStats').value === 'yes',
    width: w, height: h,
  };
}

function getDashArray(style, weight) {
  if (style === 'dashed') return [weight * 4, weight * 2];
  if (style === 'dotted') return [1, weight * 2];
  return null;
}

function startPreview() {
  if (!gpxPoints.length) return;
  stopAnimation();
  const s = getSettings();
  clearAnimLayers();
  animIndex = 0;
  animPoints = [];

  // ghost full path
  if (drawnPolyline) map.removeLayer(drawnPolyline);
  drawnPolyline = L.polyline(gpxPoints.map(p => [p.lat, p.lon]), {
    color: '#ddd', weight: s.lineWeight, opacity: 0.4,
    dashArray: getDashArray(s.lineDash, s.lineWeight)
  }).addTo(map);

  if (s.followMode === 'fit') fitMap();

  // stats
  if (s.showStats) {
    document.getElementById('statsOverlay').style.display = 'block';
  }

  const delay = s.startDelay * 1000;
  setTimeout(() => runAnimation(s, false), delay);
}

function clearAnimLayers() {
  if (animPolyline) { map.removeLayer(animPolyline); animPolyline = null; }
  if (markerCircle) { map.removeLayer(markerCircle); markerCircle = null; }
  if (markerOutline) { map.removeLayer(markerOutline); markerOutline = null; }
  if (animLayer) { map.removeLayer(animLayer); animLayer = null; }
}

function runAnimation(s, recording) {
  const interval = 1000 / s.fps;
  let lastTime = 0;

  function frame(timestamp) {
    if (timestamp - lastTime < interval) {
      animFrame = requestAnimationFrame(frame);
      return;
    }
    lastTime = timestamp;

    const step = Math.min(s.speed, gpxPoints.length - animIndex);
    for (let i = 0; i < step; i++) {
      if (animIndex >= gpxPoints.length) break;
      animPoints.push(gpxPoints[animIndex]);
      animIndex++;
    }

    // redraw polyline
    if (animPolyline) map.removeLayer(animPolyline);

    let displayPts = animPoints;
    if (s.showTrail === 'tail') displayPts = animPoints.slice(-s.tailLen);
    if (s.showTrail === 'none') displayPts = [];

    if (displayPts.length > 1) {
      animPolyline = L.polyline(displayPts.map(p => [p.lat, p.lon]), {
        color: s.lineColor,
        weight: s.lineWeight,
        opacity: s.lineOpacity,
        dashArray: getDashArray(s.lineDash, s.lineWeight),
        lineCap: 'round',
        lineJoin: 'round'
      }).addTo(map);
    }

    // marker
    const cur = animPoints[animPoints.length - 1];
    if (markerOutline) map.removeLayer(markerOutline);
    if (markerCircle) map.removeLayer(markerCircle);
    markerOutline = L.circleMarker([cur.lat, cur.lon], {
      radius: s.markerSize / 2 + 3,
      color: 'white', fillColor: 'white', fillOpacity: 1, weight: 0
    }).addTo(map);
    markerCircle = L.circleMarker([cur.lat, cur.lon], {
      radius: s.markerSize / 2,
      color: s.markerColor, fillColor: s.markerColor, fillOpacity: 1, weight: 2
    }).addTo(map);

    // follow
    if (s.followMode === 'follow') {
      map.setView([cur.lat, cur.lon], map.getZoom(), { animate: true, duration: 0.3 });
    }

    // stats
    if (s.showStats) {
      const dist = calcTotalDistance(animPoints);
      document.getElementById('statDist').textContent = (dist / 1000).toFixed(2) + ' km';
      document.getElementById('statPt').textContent = animIndex + ' / ' + gpxPoints.length;
      const eles = animPoints.map(p => p.ele).filter(e => e !== null);
      document.getElementById('statAlt').textContent = eles.length ? Math.round(eles[eles.length-1]) + ' m' : '—';
    }

    if (animIndex < gpxPoints.length) {
      animFrame = requestAnimationFrame(frame);
    } else {
      // end
      setTimeout(() => {
        if (recording) {
          stopRecording();
        }
      }, s.endDelay * 1000);
    }
  }

  animFrame = requestAnimationFrame(frame);
}

function stopAnimation() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ── RECORDING ──────────────────────────────────────────────────────────────
function startRecording() {
  if (!gpxPoints.length) return;
  stopAnimation();
  clearAnimLayers();

  const s = getSettings();

  // Check support
  if (!window.MediaRecorder) {
    toast('⚠ 이 브라우저는 MediaRecorder를 지원하지 않습니다');
    return;
  }

  // Use map canvas
  const mapPane = document.getElementById('map');
  // Collect canvases inside the map
  let stream;
  try {
    // Try to capture the map element
    const allCanvas = mapPane.querySelectorAll('canvas');
    if (allCanvas.length > 0) {
      stream = allCanvas[0].captureStream(s.fps);
    } else {
      toast('⚠ 지도 캔버스를 찾을 수 없습니다. 잠시 후 다시 시도하세요.');
      return;
    }
  } catch(e) {
    toast('⚠ 화면 캡처 실패: ' + e.message);
    return;
  }

  const mimeTypes = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
  let mimeType = '';
  for (const mt of mimeTypes) {
    if (MediaRecorder.isTypeSupported(mt)) { mimeType = mt; break; }
  }
  if (!mimeType) {
    toast('⚠ 지원하는 비디오 포맷이 없습니다');
    return;
  }

  recordedChunks = [];
  try {
    mediaRecorder = new MediaRecorder(stream, {
      mimeType,
      videoBitsPerSecond: s.bitrate * 1_000_000
    });
  } catch(e) {
    toast('⚠ MediaRecorder 초기화 실패');
    return;
  }

  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
  mediaRecorder.onstop = saveVideo;

  mediaRecorder.start(100);
  isRecording = true;

  document.getElementById('recIndicator').style.display = 'block';
  document.getElementById('recordBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressLabel').textContent = '녹화 중... 애니메이션 완료시 자동 저장됩니다';

  animIndex = 0;
  animPoints = [];
  if (drawnPolyline) map.removeLayer(drawnPolyline);
  drawnPolyline = L.polyline(gpxPoints.map(p => [p.lat, p.lon]), {
    color: '#ddd', weight: s.lineWeight, opacity: 0.35
  }).addTo(map);

  if (s.followMode === 'fit') fitMap();
  if (s.showStats) document.getElementById('statsOverlay').style.display = 'block';

  // progress tracking via animIndex
  const origRun = runAnimation;
  const progressInterval = setInterval(() => {
    const pct = gpxPoints.length ? (animIndex / gpxPoints.length * 100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `녹화 중... ${pct.toFixed(0)}% (${animIndex}/${gpxPoints.length})`;
    if (animIndex >= gpxPoints.length) clearInterval(progressInterval);
  }, 200);

  toast('⏺ 녹화 시작! 애니메이션이 끝나면 자동 저장됩니다');
  setTimeout(() => runAnimation(s, true), s.startDelay * 1000);
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  stopAnimation();
  isRecording = false;
  document.getElementById('recIndicator').style.display = 'none';
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('recordBtn').disabled = false;
  document.getElementById('progressLabel').textContent = '파일 저장 중...';
}

function saveVideo() {
  if (!recordedChunks.length) { toast('⚠ 저장할 데이터가 없습니다'); return; }
  const mimeType = recordedChunks[0].type || 'video/webm';
  const blob = new Blob(recordedChunks, { type: mimeType });
  const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'gpx-animation-' + Date.now() + '.' + ext;
  a.click();
  URL.revokeObjectURL(url);

  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressLabel').textContent = '✓ 저장 완료! (' + (blob.size / 1024 / 1024).toFixed(1) + ' MB)';
  toast('✓ 영상 저장 완료!');
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// Resize map on load
window.addEventListener('resize', () => map.invalidateSize());
setTimeout(() => map.invalidateSize(), 100);
</script>
